<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umbral OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #0e0f0c;
  --surface: #161710;
  --card: #1c1e17;
  --border: #2a2d22;
  --accent: #c8e060;
  --accent-dim: #a8bc4a;
  --text: #e8eadf;
  --text-muted: #7a7d6e;
  --text-faint: #3d3f35;
  --ok: #60c882;
  --warn: #e0b060;
  --danger: #e06060;
  --orange: #e08040;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

header {
  padding: 13px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 11px;
  background: var(--surface);
  flex-shrink: 0;
}

header h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 19px;
  color: var(--accent);
}

header span {
  font-size: 9px;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.hdr-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}

.sync-badge {
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 20px;
  border: 1px solid var(--border);
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 5px;
}

.sync-badge.synced {
  border-color: var(--ok);
  color: var(--ok);
}

.layout {
  display: grid;
  grid-template-columns: 240px 1fr;
  flex: 1;
  overflow: hidden;
}

.sidebar {
  border-right: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-section {
  padding: 9px 13px 7px;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.btn-add {
  background: none;
  border: 1px solid var(--border);
  color: var(--accent);
  font-family: 'DM Mono', monospace;
  font-size: 15px;
  width: 21px;
  height: 21px;
  border-radius: 3px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.btn-add:hover {
  background: rgba(200, 224, 96, 0.1);
}

.consultant-list {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
}

.consultant-item {
  padding: 8px 13px;
  cursor: pointer;
  border-bottom: 1px solid var(--text-faint);
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.consultant-item:hover {
  background: rgba(200, 224, 96, 0.05);
}

.consultant-item.active {
  background: rgba(200, 224, 96, 0.08);
  border-left: 3px solid var(--accent);
  padding-left: 10px;
}

.c-avatar {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 500;
  flex-shrink: 0;
}

.c-info {
  flex: 1;
  min-width: 0;
}

.c-name {
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-size: 10.5px;
}

.main-area {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  overflow-x: auto;
}

.tab {
  padding: 8px 13px;
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
}

.tab:hover {
  color: var(--text);
}

.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.view-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.view {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: none;
  scrollbar-width: thin;
}

.view.active {
  display: block;
}

.week-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  margin-bottom: 20px;
}

.week-day {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 12px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  min-height: 140px;
  display: flex;
  flex-direction: column;
}

.week-day.today {
  border-color: var(--accent);
  background: rgba(200, 224, 96, 0.08);
}

.week-day.next-week {
  opacity: 0.4;
}

.week-day:hover {
  border-color: var(--accent);
}

.week-day-header {
  font-size: 9px;
  color: var(--text-muted);
  margin-bottom: 6px;
  font-weight: 600;
}

.week-day-num {
  font-size: 14px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 8px;
}

.week-day-events {
  font-size: 8px;
  color: var(--text-muted);
  text-align: left;
}

.event-tag {
  display: inline-block;
  padding: 2px 5px;
  background: var(--border);
  border-radius: 2px;
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}

.task-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 12px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
}

.task-left {
  flex: 1;
}

.task-title {
  font-size: 11px;
  color: var(--text);
  margin-bottom: 3px;
  font-weight: 500;
}

.task-meta {
  font-size: 8.5px;
  color: var(--text-muted);
}

.task-consultant-badge {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 8px;
  font-weight: 500;
  color: var(--bg);
}

.section-title {
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* CHAT FLOTANTE */
.chat-floating {
  position: fixed;
  bottom: 0;
  right: 0;
  width: 400px;
  height: 320px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom: none;
  border-right: none;
  display: flex;
  flex-direction: column;
  z-index: 100;
}

.chat-header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}

.chat-header h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 13px;
  color: var(--accent);
}

.chat-close {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 16px;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scrollbar-width: thin;
}

.msg {
  display: flex;
  flex-direction: column;
  gap: 2px;
  animation: fadeUp 0.3s ease;
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(6px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.msg-label {
  font-size: 7px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-faint);
}

.msg.user .msg-label {
  color: var(--accent);
}

.msg-bubble {
  padding: 8px 10px;
  border-radius: 3px;
  font-size: 10px;
  line-height: 1.6;
}

.msg.user .msg-bubble {
  background: rgba(200, 224, 96, 0.1);
  border: 1px solid rgba(200, 224, 96, 0.2);
  color: var(--text);
}

.msg.assistant .msg-bubble {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 9.5px;
}

.consultant-chips {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  flex-shrink: 0;
  scrollbar-width: thin;
  max-height: 60px;
  overflow-y: auto;
}

.chip {
  padding: 3px 8px;
  border-radius: 20px;
  font-size: 8px;
  cursor: pointer;
  border: 1px solid var(--border);
  transition: all 0.2s;
  white-space: nowrap;
}

.chip.selected {
  border-color: var(--accent);
  background: rgba(200, 224, 96, 0.15);
}

.chat-input-area {
  padding: 8px 12px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

.chat-input-wrap {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 3px;
  display: flex;
  align-items: flex-end;
}

.chat-input-wrap textarea {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  padding: 6px 8px;
  resize: none;
  outline: none;
  max-height: 60px;
}

.chat-input-wrap textarea::placeholder {
  color: var(--text-faint);
}

.btn-send-chat {
  padding: 6px 10px;
  background: var(--accent);
  color: var(--bg);
  border: none;
  font-size: 12px;
  cursor: pointer;
  border-radius: 3px;
}

.btn-send-chat:hover {
  background: var(--accent-dim);
}

/* MODAL EVENTO */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
}

.modal-overlay.open {
  display: flex;
}

.modal {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 20px;
  width: 400px;
  max-width: 95vw;
}

.modal h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 16px;
  margin-bottom: 14px;
  color: var(--accent);
}

.field {
  margin-bottom: 12px;
}

.field label {
  display: block;
  font-size: 8px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.field input,
.field select,
.field textarea {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 8px;
  outline: none;
  border-radius: 3px;
}

.field input:focus,
.field select:focus,
.field textarea:focus {
  border-color: var(--accent);
}

.modal-footer {
  display: flex;
  gap: 8px;
  margin-top: 16px;
  justify-content: flex-end;
}

.btn {
  padding: 8px 14px;
  border: none;
  border-radius: 3px;
  cursor: pointer;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.btn-primary {
  background: var(--accent);
  color: var(--bg);
}

.btn-primary:hover {
  background: var(--accent-dim);
}

.btn-ghost {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
}

.btn-ghost:hover {
  border-color: var(--text);
  color: var(--text);
}

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-faint);
  font-size: 11px;
}

.drop-zone {
  border: 2px dashed var(--border);
  border-radius: 5px;
  padding: 30px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--card);
  margin-bottom: 20px;
}

.drop-zone:hover,
.drop-zone.dragover {
  border-color: var(--accent);
  background: rgba(200, 224, 96, 0.05);
}

.drop-zone p {
  font-size: 11px;
  color: var(--text-muted);
}

.doc-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 10px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.doc-name {
  font-size: 10px;
  color: var(--text);
}

.doc-date {
  font-size: 8px;
  color: var(--text-muted);
  margin-top: 2px;
}

.btn-small {
  padding: 4px 8px;
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  cursor: pointer;
  border-radius: 3px;
  font-size: 8px;
}

.btn-small:hover {
  border-color: var(--danger);
  color: var(--danger);
}

textarea {
  resize: vertical;
  min-height: 100px;
}
</style>
</head>
<body>

<header>
  <h1>Umbral OS</h1>
  <span>v2 · Gestor Ejecutivo</span>
  <div class="hdr-right">
    <div class="sync-badge synced">✓ Sincronizado</div>
  </div>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">
      Consultores
      <button class="btn-add" onclick="openAddConsultant()">+</button>
    </div>
    <div class="consultant-list" id="consultantList"></div>
  </div>

  <!-- MAIN AREA -->
  <div class="main-area">
    <div class="tabs">
      <div class="tab active" data-view="home" onclick="switchView('home')">🌅 Hoy</div>
      <div class="tab" data-view="documents" onclick="switchView('documents')">📁 Documentos</div>
      <div class="tab" data-view="info" onclick="switchView('info')">⚙️ Info</div>
      <div class="tab" data-view="tasks" onclick="switchView('tasks')">✅ Tareas</div>
    </div>

    <div class="view-container">
      <!-- HOME -->
      <div class="view active" id="view-home">
        <div class="section-title">Esta semana</div>
        <div class="week-grid" id="weekGrid"></div>
        
        <div class="section-title">Tareas pendientes</div>
        <div id="tasksHome"></div>
      </div>

      <!-- CONSULTANT DOCUMENTS -->
      <div class="view" id="view-documents">
        <div id="documentsContent"></div>
      </div>

      <!-- CONSULTANT INFO -->
      <div class="view" id="view-info">
        <div id="infoContent"></div>
      </div>

      <!-- TASKS -->
      <div class="view" id="view-tasks">
        <div id="tasksList"></div>
      </div>
    </div>
  </div>
</div>

<!-- CHAT FLOTANTE -->
<div class="chat-floating" id="chatFloating">
  <div class="chat-header">
    <h3>Chat</h3>
    <button class="chat-close" onclick="toggleChat()">−</button>
  </div>
  
  <div class="consultant-chips" id="consultantChips"></div>
  
  <div class="chat-messages" id="chatMessages"></div>
  
  <div class="chat-input-area">
    <div class="chat-input-wrap">
      <textarea id="chatInput" placeholder="Pregunta o agrega tarea..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMessage()}"></textarea>
    </div>
    <button class="btn-send-chat" onclick="sendChatMessage()">↑</button>
  </div>
</div>

<!-- MODAL AGREGAR CONSULTOR -->
<div class="modal-overlay" id="modalAddConsultant">
  <div class="modal">
    <h3>Agregar Consultor</h3>
    <div class="field">
      <label>Nombre</label>
      <input type="text" id="newConsultantName" placeholder="Ej. Ing. García">
    </div>
    <div class="field">
      <label>Área / Especialidad</label>
      <input type="text" id="newConsultantArea" placeholder="Ej. Estructural">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalAddConsultant')">Cancelar</button>
      <button class="btn btn-primary" onclick="addConsultant()">Agregar</button>
    </div>
  </div>
</div>

<!-- MODAL AGREGAR EVENTO -->
<div class="modal-overlay" id="modalAddEvent">
  <div class="modal">
    <h3>Agregar Evento / Tarea</h3>
    <div class="field">
      <label>Descripción</label>
      <textarea id="eventDesc" placeholder="Ej. Entrega de planos estructurales" rows="2"></textarea>
    </div>
    <div class="field">
      <label>Consultor (opcional)</label>
      <select id="eventConsultant">
        <option value="">General</option>
      </select>
    </div>
    <div class="field">
      <label>Fecha</label>
      <input type="date" id="eventDate">
    </div>
    <div class="field">
      <label>Tipo</label>
      <select id="eventType">
        <option value="task">Tarea</option>
        <option value="review">Revisión</option>
        <option value="delivery">Entrega</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalAddEvent')">Cancelar</button>
      <button class="btn btn-primary" onclick="addEvent()">Agregar</button>
    </div>
  </div>
</div>

<script>
const COLORS = ['#c8e060', '#a060e0', '#e0a060', '#60a0e0', '#e06060', '#a0c860', '#60c8c8', '#c860c8', '#8080e0', '#c89060'];

let consultants = [];
let tasks = [];
let selectedConsultantForChat = null;
let activeView = 'home';
let calendarSelectedDate = null;

// DATA MANAGEMENT
function loadData() {
  const c = localStorage.getItem('umbral_consultants');
  const t = localStorage.getItem('umbral_tasks');
  consultants = c ? JSON.parse(c) : [];
  tasks = t ? JSON.parse(t) : [];
}

function saveData() {
  localStorage.setItem('umbral_consultants', JSON.stringify(consultants));
  localStorage.setItem('umbral_tasks', JSON.stringify(tasks));
}

// SIDEBAR
function updateSidebar() {
  const list = document.getElementById('consultantList');
  list.innerHTML = consultants.map((c, i) => `
    <div class="consultant-item" onclick="selectConsultant('${c.id}')">
      <div class="c-avatar" style="background:${COLORS[i%10]};color:var(--bg)">${c.name.charAt(0)}</div>
      <div class="c-info">
        <div class="c-name">${c.name}</div>
        <div style="font-size:8px;color:var(--text-muted)">${c.area}</div>
      </div>
    </div>
  `).join('');
  
  updateConsultantChips();
}

function selectConsultant(id) {
  selectedConsultantForChat = id;
  updateConsultantChips();
}

function updateConsultantChips() {
  const chips = document.getElementById('consultantChips');
  chips.innerHTML = '<div class="chip" onclick="selectedConsultantForChat=null;updateConsultantChips()" style="'+(selectedConsultantForChat===null?'border-color:var(--accent);background:rgba(200,224,96,0.15)':'')+'">General</div>' + 
    consultants.map((c, i) => `
      <div class="chip" style="${selectedConsultantForChat===c.id?'border-color:var(--accent);background:rgba(200,224,96,0.15);':''}background:${COLORS[i%10]}33;color:${COLORS[i%10]}" onclick="selectedConsultantForChat='${c.id}';updateConsultantChips()">${c.name}</div>
    `).join('');
}

// VIEWS
function switchView(v) {
  activeView = v;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === v));
  document.querySelectorAll('.view').forEach(v2 => v2.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  
  if (v === 'home') renderHome();
  else if (v === 'documents') renderDocuments();
  else if (v === 'info') renderInfo();
  else if (v === 'tasks') renderTasksList();
}

function renderHome() {
  renderWeeklyCalendar();
  renderTasksHome();
}

function renderWeeklyCalendar() {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  
  const dayNames = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
  const monthNames = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
  
  let html = '';
  for (let i = 0; i < 14; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() + i);
    
    const isToday = d.getTime() === today.getTime();
    const isThisWeek = i < 7;
    const dayEvents = tasks.filter(t => {
      const tDate = new Date(t.date);
      tDate.setHours(0, 0, 0, 0);
      return tDate.getTime() === d.getTime();
    });
    
    html += `
      <div class="week-day ${isToday?'today':''} ${!isThisWeek?'next-week':''}" onclick="openEventModal('${d.toISOString().split('T')[0]}')">
        <div class="week-day-header">${dayNames[d.getDay()]} ${d.getDate()}</div>
        <div class="week-day-num">${d.getDate()}</div>
        <div class="week-day-events">
          ${dayEvents.map(e => {
            const c = consultants.find(x => x.id === e.consultant);
            const color = c ? COLORS[consultants.indexOf(c) % 10] : 'var(--accent)';
            return `<div class="event-tag" style="background:${color}44;color:${color};border:1px solid ${color}66">${e.title.substring(0,12)}</div>`;
          }).join('')}
        </div>
      </div>
    `;
  }
  
  document.getElementById('weekGrid').innerHTML = html;
}

function renderTasksHome() {
  const tasksList = tasks.sort((a, b) => new Date(a.date) - new Date(b.date));
  let html = '';
  
  if (tasksList.length === 0) {
    html = '<div class="empty-state">Sin tareas pendientes</div>';
  } else {
    tasksList.slice(0, 5).forEach(t => {
      const d = new Date(t.date);
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const daysLeft = Math.floor((d - today) / (1000 * 60 * 60 * 24));
      
      const c = consultants.find(x => x.id === t.consultant);
      const color = c ? COLORS[consultants.indexOf(c) % 10] : 'var(--text-muted)';
      
      let urgColor = 'var(--ok)';
      if (daysLeft <= 0) urgColor = 'var(--danger)';
      else if (daysLeft <= 3) urgColor = 'var(--orange)';
      else if (daysLeft <= 7) urgColor = 'var(--warn)';
      
      html += `
        <div class="task-card" style="border-left:3px solid ${urgColor}">
          <div class="task-left">
            <div class="task-title">${t.title}</div>
            <div class="task-meta">
              ${c ? `<span class="task-consultant-badge" style="background:${color};margin-right:6px">${c.name}</span>` : ''}
              ${t.date} ${daysLeft === 0 ? '(Hoy)' : daysLeft < 0 ? '(Vencido)' : `(en ${daysLeft} días)`}
            </div>
          </div>
          <button class="btn-small" onclick="deleteTask('${t.id}')">✕</button>
        </div>
      `;
    });
  }
  
  document.getElementById('tasksHome').innerHTML = html;
}

function renderDocuments() {
  if (!selectedConsultantForChat) {
    document.getElementById('documentsContent').innerHTML = '<div class="empty-state">Selecciona un consultor en la lista</div>';
    return;
  }
  
  const c = consultants.find(x => x.id === selectedConsultantForChat);
  const i = consultants.indexOf(c);
  const color = COLORS[i % 10];
  
  let html = `
    <div style="background:${color}15;border:1px solid ${color}44;border-radius:4px;padding:14px;margin-bottom:16px;border-left:3px solid ${color}">
      <div style="font-size:14px;font-weight:600;color:${color};margin-bottom:4px">${c.name}</div>
      <div style="font-size:11px;color:var(--text-muted)">${c.area}</div>
    </div>
    
    <div class="section-title">Documentos del Consultor</div>
    <div class="drop-zone" id="dropZone">
      <div style="font-size:24px;margin-bottom:8px">📄</div>
      <p>Arrastra documentos aquí</p>
    </div>
    
    <div id="docList"></div>
  `;
  
  document.getElementById('documentsContent').innerHTML = html;
  
  const docs = c.documents || [];
  let docsHtml = '';
  docs.forEach((doc, idx) => {
    docsHtml += `
      <div class="doc-item">
        <div>
          <div class="doc-name">📄 ${doc.name}</div>
          <div class="doc-date">${doc.date}</div>
        </div>
        <button class="btn-small" onclick="removeDoc('${c.id}', ${idx})">✕</button>
      </div>
    `;
  });
  document.getElementById('docList').innerHTML = docsHtml || '<div class="empty-state">Sin documentos</div>';
  
  setupDropZone(c.id);
}

function renderInfo() {
  if (!selectedConsultantForChat) {
    document.getElementById('infoContent').innerHTML = '<div class="empty-state">Selecciona un consultor en la lista</div>';
    return;
  }
  
  const c = consultants.find(x => x.id === selectedConsultantForChat);
  const i = consultants.indexOf(c);
  const color = COLORS[i % 10];
  
  const hasContract = c.contract;
  
  let html = `
    <div style="background:${color}15;border:1px solid ${color}44;border-radius:4px;padding:14px;margin-bottom:16px;border-left:3px solid ${color}">
      <div style="font-size:14px;font-weight:600;color:${color};margin-bottom:4px">${c.name}</div>
      <div style="font-size:11px;color:var(--text-muted)">${c.area}</div>
    </div>
    
    <div class="section-title">Información de Contacto</div>
    <div class="field">
      <label>Teléfono</label>
      <input type="tel" id="infoPhone" value="${c.phone || ''}" placeholder="+52 1234567890" onchange="updateConsultantInfo('${c.id}', 'phone', this.value)">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="infoEmail" value="${c.email || ''}" placeholder="consultor@empresa.com" onchange="updateConsultantInfo('${c.id}', 'email', this.value)">
    </div>
    <div class="field">
      <label>Horarios / Disponibilidad</label>
      <textarea id="infoSchedule" placeholder="Lunes a Jueves, 9:00 AM - 5:00 PM" onchange="updateConsultantInfo('${c.id}', 'schedule', this.value)">${c.schedule || ''}</textarea>
    </div>
    
    <div class="section-title">Contrato / Cotización</div>
    ${hasContract ? `
      <div class="doc-item" style="margin-bottom:14px">
        <div>
          <div class="doc-name">📋 ${hasContract.name}</div>
          <div class="doc-date">${hasContract.date}</div>
        </div>
        <button class="btn-small" onclick="removeContract('${c.id}')">✕</button>
      </div>
      <button class="btn-small" style="background:var(--accent);color:var(--bg);margin-bottom:16px" onclick="downloadContract('${c.id}')">Descargar Contrato</button>
    ` : `
      <div class="drop-zone" id="contractZone" style="margin-bottom:14px">
        <div style="font-size:20px;margin-bottom:8px">📋</div>
        <p>Arrastra contrato/cotización aquí</p>
      </div>
    `}
    
    <div class="section-title">Acciones</div>
    <button class="btn-small" style="background:var(--danger);color:white;width:100%" onclick="deleteConsultant('${c.id}')">🗑 Eliminar Consultor</button>
  `;
  
  document.getElementById('infoContent').innerHTML = html;
  
  // Setup contract drop zone if no contract exists
  if (!hasContract) {
    const cz = document.getElementById('contractZone');
    if (cz) {
      cz.addEventListener('dragover', e => {
        e.preventDefault();
        cz.classList.add('dragover');
      });
      cz.addEventListener('dragleave', () => cz.classList.remove('dragover'));
      cz.addEventListener('drop', e => {
        e.preventDefault();
        cz.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file) {
          uploadContract(c.id, file);
        }
      });
    }
  }
}

function renderTasksList() {
  const allTasks = tasks.sort((a, b) => new Date(a.date) - new Date(b.date));
  let html = '<div class="section-title">Todas las tareas</div>';
  
  if (allTasks.length === 0) {
    html += '<div class="empty-state">Sin tareas</div>';
  } else {
    allTasks.forEach(t => {
      const d = new Date(t.date);
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const daysLeft = Math.floor((d - today) / (1000 * 60 * 60 * 24));
      
      const c = consultants.find(x => x.id === t.consultant);
      const color = c ? COLORS[consultants.indexOf(c) % 10] : 'var(--text-muted)';
      
      let urgColor = 'var(--ok)';
      if (daysLeft <= 0) urgColor = 'var(--danger)';
      else if (daysLeft <= 3) urgColor = 'var(--orange)';
      else if (daysLeft <= 7) urgColor = 'var(--warn)';
      
      html += `
        <div class="task-card" style="border-left:3px solid ${urgColor}">
          <div class="task-left">
            <div class="task-title">${t.title}</div>
            <div class="task-meta">
              ${c ? `<span class="task-consultant-badge" style="background:${color};margin-right:6px">${c.name}</span>` : ''}
              ${t.date} · ${t.type}
            </div>
          </div>
          <button class="btn-small" onclick="deleteTask('${t.id}')">✕</button>
        </div>
      `;
    });
  }
  
  document.getElementById('tasksList').innerHTML = html;
}

// MODALS
function openModal(id) {
  document.getElementById(id).className = 'modal-overlay open';
}

function closeModal(id) {
  document.getElementById(id).className = 'modal-overlay';
}

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => {
    if (e.target === m) m.className = 'modal-overlay';
  });
});

function openAddConsultant() {
  openModal('modalAddConsultant');
  setTimeout(() => document.getElementById('newConsultantName').focus(), 100);
}

function addConsultant() {
  const name = document.getElementById('newConsultantName').value.trim();
  const area = document.getElementById('newConsultantArea').value.trim();
  
  if (!name || !area) return;
  
  consultants.push({
    id: 'c_' + Date.now(),
    name,
    area,
    documents: []
  });
  
  saveData();
  closeModal('modalAddConsultant');
  updateSidebar();
  
  document.getElementById('newConsultantName').value = '';
  document.getElementById('newConsultantArea').value = '';
  
  // Update event modal select
  updateEventConsultantSelect();
}

function openEventModal(date) {
  document.getElementById('eventDate').value = date;
  updateEventConsultantSelect();
  openModal('modalAddEvent');
  setTimeout(() => document.getElementById('eventDesc').focus(), 100);
}

function updateEventConsultantSelect() {
  const sel = document.getElementById('eventConsultant');
  sel.innerHTML = '<option value="">General</option>' + 
    consultants.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
}

function addEvent() {
  const title = document.getElementById('eventDesc').value.trim();
  const date = document.getElementById('eventDate').value;
  const consultant = document.getElementById('eventConsultant').value || null;
  const type = document.getElementById('eventType').value;
  
  if (!title || !date) return;
  
  // Parse dates from title
  const dateMatch = title.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  const finalDate = dateMatch ? `20${dateMatch[3]}`.slice(0, 4) + '-' + dateMatch[2].padStart(2, '0') + '-' + dateMatch[1].padStart(2, '0') : date;
  
  tasks.push({
    id: 't_' + Date.now(),
    title,
    date: finalDate,
    consultant: consultant || null,
    type
  });
  
  saveData();
  closeModal('modalAddEvent');
  
  document.getElementById('eventDesc').value = '';
  document.getElementById('eventDate').value = '';
  document.getElementById('eventConsultant').value = '';
  
  if (activeView === 'home') {
    renderHome();
  } else if (activeView === 'tasks') {
    renderTasksList();
  }
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  saveData();
  renderHome();
  renderTasksList();
}

// CHAT
function sendChatMessage() {
  const input = document.getElementById('chatInput');
  const message = input.value.trim();
  
  if (!message) return;
  
  // Add user message
  addChatMessage(message, 'user');
  input.value = '';
  
  // Parse dates and create task
  const dateMatch = message.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if (dateMatch) {
    const date = `20${dateMatch[3]}`.slice(0, 4) + '-' + dateMatch[2].padStart(2, '0') + '-' + dateMatch[1].padStart(2, '0');
    
    tasks.push({
      id: 't_' + Date.now(),
      title: message,
      date,
      consultant: selectedConsultantForChat || null,
      type: 'task'
    });
    
    saveData();
    
    const c = consultants.find(x => x.id === selectedConsultantForChat);
    const scope = c ? `para ${c.name}` : 'general';
    addChatMessage(`✓ Tarea agregada ${scope} para ${date}`, 'assistant');
    
    renderHome();
    renderTasksList();
  } else {
    addChatMessage('Para agregar una tarea, incluye una fecha: ej. "Revisar planos 15/04/2025"', 'assistant');
  }
}

function addChatMessage(text, role) {
  const container = document.getElementById('chatMessages');
  const msg = document.createElement('div');
  msg.className = 'msg ' + role;
  msg.innerHTML = `
    <div class="msg-label">${role === 'user' ? 'Tú' : 'Asistente'}</div>
    <div class="msg-bubble">${text}</div>
  `;
  container.appendChild(msg);
  container.scrollTop = container.scrollHeight;
}

function toggleChat() {
  document.getElementById('chatFloating').style.transform = 
    document.getElementById('chatFloating').style.transform === 'translateY(100%)' ? 'translateY(0)' : 'translateY(100%)';
}

// DOCUMENTOS
function setupDropZone(consultantId) {
  const dz = document.getElementById('dropZone');
  if (!dz) return;
  
  dz.addEventListener('dragover', e => {
    e.preventDefault();
    dz.classList.add('dragover');
  });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) {
      const c = consultants.find(x => x.id === consultantId);
      if (!c.documents) c.documents = [];
      c.documents.push({
        name: file.name,
        date: new Date().toLocaleDateString('es-MX'),
        size: Math.round(file.size / 1024) + 'KB'
      });
      saveData();
      renderConsultant();
    }
  });
}

function removeDoc(consultantId, idx) {
  const c = consultants.find(x => x.id === consultantId);
  if (c && c.documents) {
    c.documents.splice(idx, 1);
    saveData();
    renderDocuments();
  }
}

function updateConsultantInfo(consultantId, field, value) {
  const c = consultants.find(x => x.id === consultantId);
  if (c) {
    c[field] = value;
    saveData();
  }
}

function uploadContract(consultantId, file) {
  const c = consultants.find(x => x.id === consultantId);
  if (c) {
    const reader = new FileReader();
    reader.onload = (e) => {
      c.contract = {
        name: file.name,
        date: new Date().toLocaleDateString('es-MX'),
        data: e.target.result
      };
      saveData();
      renderInfo();
    };
    reader.readAsDataURL(file);
  }
}

function removeContract(consultantId) {
  const c = consultants.find(x => x.id === consultantId);
  if (c) {
    delete c.contract;
    saveData();
    renderInfo();
  }
}

function downloadContract(consultantId) {
  const c = consultants.find(x => x.id === consultantId);
  if (c && c.contract) {
    const link = document.createElement('a');
    link.href = c.contract.data;
    link.download = c.contract.name;
    link.click();
  }
}

function deleteConsultant(consultantId) {
  if (confirm(`¿Eliminar a ${consultants.find(x => x.id === consultantId).name}? Esta acción no se puede deshacer.`)) {
    consultants = consultants.filter(c => c.id !== consultantId);
    selectedConsultantForChat = null;
    saveData();
    updateSidebar();
    document.getElementById('infoContent').innerHTML = '<div class="empty-state">Selecciona un consultor en la lista</div>';
  }
}

// INIT
function init() {
  loadData();
  updateSidebar();
  updateEventConsultantSelect();
  renderHome();
}

init();
</script>
