<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umbral OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #0e0f0c;
  --surface: #161710;
  --card: #1c1e17;
  --border: #2a2d22;
  --accent: #c8e060;
  --accent-dim: #a8bc4a;
  --text: #e8eadf;
  --text-muted: #7a7d6e;
  --text-faint: #3d3f35;
  --ok: #60c882;
  --warn: #e0b060;
  --danger: #e06060;
  --orange: #e08040;
}

html, body {
  height: 100%;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

header {
  padding: 13px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 11px;
  background: var(--surface);
  flex-shrink: 0;
}

header h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 19px;
  color: var(--accent);
  cursor: pointer;
  transition: opacity 0.2s;
}

header h1:hover {
  opacity: 0.8;
}

header span {
  font-size: 9px;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.hdr-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}

.sync-badge {
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 20px;
  border: 1px solid var(--border);
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 5px;
}

.layout {
  display: grid;
  grid-template-columns: 240px 1fr;
  flex: 1;
  overflow: hidden;
  position: relative;
}

.sidebar {
  border-right: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-section {
  padding: 9px 13px 7px;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.btn-add {
  background: none;
  border: 1px solid var(--border);
  color: var(--accent);
  font-family: 'DM Mono', monospace;
  font-size: 15px;
  width: 21px;
  height: 21px;
  border-radius: 3px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.btn-add:hover {
  background: rgba(200, 224, 96, 0.1);
}

.consultant-list {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
}

.consultant-item {
  padding: 8px 13px;
  cursor: pointer;
  border-bottom: 1px solid var(--text-faint);
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.consultant-item:hover {
  background: rgba(200, 224, 96, 0.05);
}

.consultant-item.active {
  background: rgba(200, 224, 96, 0.08);
  border-left: 3px solid var(--accent);
  padding-left: 10px;
}

.c-avatar {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 500;
  flex-shrink: 0;
}

.c-info {
  flex: 1;
  min-width: 0;
}

.c-name {
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-size: 10.5px;
}

.main-area {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  overflow-x: auto;
}

.tab {
  padding: 8px 13px;
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
}

.tab:hover {
  color: var(--text);
}

.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.view-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  padding-bottom: 0;
}

.view {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: none;
  scrollbar-width: thin;
}

.view.active {
  display: block;
}

.section-title {
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.week-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  margin-bottom: 20px;
}

.week-day {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 12px;
  cursor: pointer;
  transition: all 0.2s;
}

.week-day.today {
  border-color: var(--accent);
  background: rgba(200, 224, 96, 0.08);
}

.week-day:hover {
  border-color: var(--accent);
}

.week-day-header {
  font-size: 9px;
  color: var(--text-muted);
  margin-bottom: 6px;
  font-weight: 600;
}

.week-day-num {
  font-size: 14px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 8px;
}

.task-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 12px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
}

.task-title {
  font-size: 11px;
  color: var(--text);
  margin-bottom: 3px;
  font-weight: 500;
}

.task-meta {
  font-size: 8.5px;
  color: var(--text-muted);
}

.task-consultant-badge {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 8px;
  font-weight: 500;
  color: var(--bg);
  margin-right: 6px;
}

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-faint);
  font-size: 11px;
}

.field {
  margin-bottom: 12px;
}

.field label {
  display: block;
  font-size: 8px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.field input,
.field select,
.field textarea {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 8px;
  outline: none;
  border-radius: 3px;
  resize: vertical;
  min-height: 100px;
}

.field input:focus,
.field select:focus,
.field textarea:focus {
  border-color: var(--accent);
}

.field select option {
  background: var(--card);
}

.drop-zone {
  border: 2px dashed var(--border);
  border-radius: 5px;
  padding: 30px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--card);
  margin-bottom: 20px;
}

.drop-zone:hover,
.drop-zone.dragover {
  border-color: var(--accent);
  background: rgba(200, 224, 96, 0.05);
}

.doc-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 10px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.doc-name {
  font-size: 10px;
  color: var(--text);
}

.doc-date {
  font-size: 8px;
  color: var(--text-muted);
  margin-top: 2px;
}

.btn-small {
  padding: 4px 8px;
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  cursor: pointer;
  border-radius: 3px;
  font-size: 8px;
  transition: all 0.2s;
}

.btn-small:hover {
  border-color: var(--danger);
  color: var(--danger);
}

.btn-delete-consultant {
  width: 80px;
  padding: 12px 8px;
  background: var(--danger);
  color: white;
  border: none;
  border-radius: 3px;
  font-size: 9px;
  cursor: pointer;
  margin-top: auto;
  font-weight: 500;
  transition: all 0.2s;
}

.btn-delete-consultant:hover {
  background: #dc2626;
}

.info-container {
  display: flex;
  flex-direction: column;
  height: 100%;
}

/* CHAT CLAUDE STYLE */
.chat-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 360px;
  height: auto;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  z-index: 100;
  box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
  max-height: 500px;
  min-height: 80px;
}

.chat-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}

.chat-header h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 13px;
  color: var(--accent);
}

.chat-controls {
  display: flex;
  gap: 8px;
}

.chat-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 16px;
  transition: color 0.2s;
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.chat-btn:hover {
  color: var(--text);
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scrollbar-width: thin;
  min-height: 0;
}

.msg {
  display: flex;
  flex-direction: column;
  gap: 2px;
  animation: fadeUp 0.3s ease;
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(6px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.msg-label {
  font-size: 7px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-faint);
}

.msg.user .msg-label {
  color: var(--accent);
}

.msg-bubble {
  padding: 8px 10px;
  border-radius: 8px;
  font-size: 10px;
  line-height: 1.6;
}

.msg.user .msg-bubble {
  background: var(--accent);
  color: var(--bg);
  margin-left: auto;
  max-width: 90%;
}

.msg.assistant .msg-bubble {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 9.5px;
  max-width: 90%;
}

.chat-input-area {
  padding: 10px 12px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: flex-end;
  flex-shrink: 0;
}

.chat-input-wrap {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  display: flex;
  align-items: flex-end;
  padding: 0 10px;
}

.chat-input-wrap textarea {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 8px 0;
  resize: none;
  outline: none;
  max-height: 80px;
}

.chat-input-wrap textarea::placeholder {
  color: var(--text-faint);
}

.chat-action-btn {
  padding: 0;
  width: 28px;
  height: 28px;
  background: none;
  border: none;
  color: var(--accent);
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.2s;
}

.chat-action-btn:hover {
  opacity: 0.8;
}

.chat-collapsed {
  height: auto;
}

.chat-collapsed .chat-messages,
.chat-collapsed .chat-input-area {
  display: none;
}

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
}

.modal-overlay.open {
  display: flex;
}

.modal {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 20px;
  width: 400px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
}

.modal h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 16px;
  margin-bottom: 14px;
  color: var(--accent);
}

.modal-footer {
  display: flex;
  gap: 8px;
  margin-top: 16px;
  justify-content: flex-end;
}

.btn {
  padding: 8px 14px;
  border: none;
  border-radius: 3px;
  cursor: pointer;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: all 0.2s;
}

.btn-primary {
  background: var(--accent);
  color: var(--bg);
}

.btn-primary:hover {
  background: var(--accent-dim);
}

.btn-ghost {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
}

.btn-ghost:hover {
  border-color: var(--text);
  color: var(--text);
}

.calendar-hourly {
  display: grid;
  grid-template-columns: 60px 1fr;
  gap: 0;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  margin-top: 10px;
}

.cal-time-labels {
  border-right: 1px solid var(--border);
  background: var(--surface);
}

.cal-time-label {
  height: 60px;
  padding: 4px;
  font-size: 8px;
  color: var(--text-muted);
  text-align: right;
  border-bottom: 1px solid var(--border);
  line-height: 1.2;
}

.cal-slots {
  display: flex;
  flex-direction: column;
}

.cal-slot {
  height: 60px;
  border-bottom: 1px solid var(--border);
  padding: 2px;
  cursor: pointer;
  position: relative;
  transition: background 0.2s;
}

.cal-slot:hover {
  background: rgba(200, 224, 96, 0.03);
}

.cal-event {
  position: absolute;
  left: 2px;
  right: 2px;
  padding: 3px;
  border-radius: 2px;
  font-size: 8px;
  color: white;
  font-weight: 500;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.2s;
}

.cal-event:hover {
  filter: brightness(1.1);
}

.cal-event-menu {
  position: fixed;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  z-index: 300;
  min-width: 120px;
}

.cal-event-menu-item {
  padding: 8px 12px;
  cursor: pointer;
  font-size: 10px;
  color: var(--text);
  transition: background 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.cal-event-menu-item:hover {
  background: rgba(200, 224, 96, 0.1);
}

.color-picker {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}

.color-option {
  width: 30px;
  height: 30px;
  border-radius: 4px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.2s;
}

.color-option:hover {
  border-color: var(--text);
}

.color-option.selected {
  border-color: white;
}
</style>
</head>
<body>

<header>
  <h1 onclick="goToDashboard()">Umbral OS</h1>
  <span>v3 · Ejecutivo</span>
  <div class="hdr-right">
    <div class="sync-badge">✓ Sincronizado</div>
  </div>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">
      Consultores
      <button class="btn-add" onclick="openAddConsultant()">+</button>
    </div>
    <div class="consultant-list" id="consultantList"></div>
  </div>

  <!-- MAIN AREA -->
  <div class="main-area">
    <div class="tabs">
      <div class="tab active" data-view="dashboard" onclick="switchView('dashboard')">📊 Dashboard</div>
      <div class="tab" data-view="documents" onclick="switchView('documents')">📁 Documentos</div>
      <div class="tab" data-view="info" onclick="switchView('info')">⚙️ Info</div>
    </div>

    <div class="view-container">
      <!-- DASHBOARD -->
      <div class="view active" id="view-dashboard">
        <div class="section-title">Esta semana</div>
        <div class="week-grid" id="weekGrid"></div>
        
        <div class="section-title">Tareas pendientes</div>
        <div id="tasksHome"></div>
      </div>

      <!-- DOCUMENTOS -->
      <div class="view" id="view-documents">
        <div id="documentsContent"></div>
      </div>

      <!-- INFO -->
      <div class="view" id="view-info">
        <div class="info-container" id="infoContent"></div>
      </div>
    </div>
  </div>
</div>

<!-- CHAT CLAUDE STYLE -->
<div class="chat-container" id="chatContainer">
  <div class="chat-header">
    <h3>Chat</h3>
    <div class="chat-controls">
      <button class="chat-btn" title="Acciones">+</button>
      <button class="chat-btn" onclick="toggleChat()" title="Minimizar">−</button>
    </div>
  </div>
  
  <div class="chat-messages" id="chatMessages"></div>
  
  <div class="chat-input-area">
    <div class="chat-input-wrap">
      <textarea id="chatInput" placeholder="Pregunta o agrega tarea..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMessage()}" oninput="autoResizeChat(this)"></textarea>
    </div>
    <button class="chat-action-btn" onclick="sendChatMessage()" title="Enviar">↑</button>
  </div>
</div>

<!-- MODAL AGREGAR CONSULTOR -->
<div class="modal-overlay" id="modalAddConsultant">
  <div class="modal">
    <h3>Agregar Consultor</h3>
    <div class="field">
      <label>Nombre</label>
      <input type="text" id="newConsultantName" placeholder="Ej. Ing. García">
    </div>
    <div class="field">
      <label>Área / Especialidad</label>
      <input type="text" id="newConsultantArea" placeholder="Ej. Estructural">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalAddConsultant')">Cancelar</button>
      <button class="btn btn-primary" onclick="addConsultant()">Agregar</button>
    </div>
  </div>
</div>

<!-- MODAL AGREGAR EVENTO -->
<div class="modal-overlay" id="modalAddEvent">
  <div class="modal">
    <h3>Agregar Evento / Tarea</h3>
    <div class="field">
      <label>Descripción</label>
      <textarea id="eventDesc" placeholder="Ej. Entrega de planos estructurales" rows="2" style="min-height:60px;resize:vertical"></textarea>
    </div>
    <div class="field">
      <label>Consultor (opcional)</label>
      <select id="eventConsultant">
        <option value="">General</option>
      </select>
    </div>
    <div class="field">
      <label>Fecha</label>
      <input type="date" id="eventDate">
    </div>
    <div class="field">
      <label>Hora</label>
      <input type="time" id="eventTime" value="09:00">
    </div>
    <div class="field">
      <label>Tipo</label>
      <select id="eventType">
        <option value="task">Tarea</option>
        <option value="meeting">Reunión</option>
        <option value="review">Revisión</option>
        <option value="delivery">Entrega</option>
      </select>
    </div>
    <div class="field">
      <label>Color</label>
      <div class="color-picker" id="colorPicker"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalAddEvent')">Cancelar</button>
      <button class="btn btn-primary" onclick="addEvent()">Agregar</button>
    </div>
  </div>
</div>

<!-- COLOR PICKER MENU EVENTO -->
<div class="cal-event-menu" id="eventColorMenu" style="display:none">
  <div class="cal-event-menu-item" style="background:#c8e060" onclick="setEventColor('#c8e060'); closeEventMenu()">Accent</div>
  <div class="cal-event-menu-item" style="background:#60c882" onclick="setEventColor('#60c882'); closeEventMenu()">Verde</div>
  <div class="cal-event-menu-item" style="background:#e0b060" onclick="setEventColor('#e0b060'); closeEventMenu()">Naranja</div>
  <div class="cal-event-menu-item" style="background:#e06060" onclick="setEventColor('#e06060'); closeEventMenu()">Rojo</div>
  <div class="cal-event-menu-item" style="background:#60a0e0" onclick="setEventColor('#60a0e0'); closeEventMenu()">Azul</div>
  <div class="cal-event-menu-item" style="background:#a060e0" onclick="setEventColor('#a060e0'); closeEventMenu()">Púrpura</div>
  <hr style="border:none;border-top:1px solid var(--border);margin:4px 0">
  <div class="cal-event-menu-item" style="color:var(--danger)" onclick="deleteEventFromMenu(); closeEventMenu()">🗑 Eliminar</div>
</div>

<script>
const COLORS = ['#c8e060', '#a060e0', '#e0a060', '#60a0e0', '#e06060', '#a0c860', '#60c8c8', '#c860c8', '#8080e0', '#c89060'];
const EVENT_COLORS = {
  '#c8e060': 'Accent',
  '#60c882': 'Verde',
  '#e0b060': 'Naranja',
  '#e06060': 'Rojo',
  '#60a0e0': 'Azul',
  '#a060e0': 'Púrpura'
};

let consultants = [];
let tasks = [];
let selectedConsultantForChat = null;
let activeView = 'dashboard';
let eventColorSelected = '#c8e060';
let contextEvent = null;

// DATA
function loadData() {
  const c = localStorage.getItem('umbral_consultants');
  const t = localStorage.getItem('umbral_tasks');
  consultants = c ? JSON.parse(c) : [];
  tasks = t ? JSON.parse(t) : [];
}

function saveData() {
  localStorage.setItem('umbral_consultants', JSON.stringify(consultants));
  localStorage.setItem('umbral_tasks', JSON.stringify(tasks));
}

function goToDashboard() {
  selectedConsultantForChat = null;
  switchView('dashboard');
  updateSidebar();
}

// SIDEBAR
function updateSidebar() {
  const list = document.getElementById('consultantList');
  list.innerHTML = consultants.map((c, i) => `
    <div class="consultant-item ${selectedConsultantForChat === c.id ? 'active' : ''}" onclick="selectConsultant('${c.id}')">
      <div class="c-avatar" style="background:${COLORS[i%10]};color:var(--bg)">${c.name.charAt(0)}</div>
      <div class="c-info">
        <div class="c-name">${c.name}</div>
        <div style="font-size:8px;color:var(--text-muted)">${c.area}</div>
      </div>
    </div>
  `).join('');
}

function selectConsultant(id) {
  selectedConsultantForChat = id;
  updateSidebar();
  if (activeView === 'documents') renderDocuments();
  else if (activeView === 'info') renderInfo();
}

// VIEWS
function switchView(v) {
  activeView = v;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === v));
  document.querySelectorAll('.view').forEach(v2 => v2.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  
  if (v === 'dashboard') renderDashboard();
  else if (v === 'documents') renderDocuments();
  else if (v === 'info') renderInfo();
}

function renderDashboard() {
  renderWeeklyCalendar();
  renderTasksHome();
}

function renderWeeklyCalendar() {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  
  const dayNames = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
  
  let html = '';
  for (let i = 0; i < 14; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() + i);
    
    const isToday = d.getTime() === today.getTime();
    const isThisWeek = i < 7;
    const dayEvents = tasks.filter(t => {
      const tDate = new Date(t.date);
      tDate.setHours(0, 0, 0, 0);
      return tDate.getTime() === d.getTime();
    });
    
    html += `
      <div class="week-day ${isToday?'today':''}" onclick="openEventModal('${d.toISOString().split('T')[0]}')">
        <div class="week-day-header">${dayNames[d.getDay()]}</div>
        <div class="week-day-num">${d.getDate()}</div>
        <div style="font-size:8px;color:var(--text-muted);margin-top:6px">
          ${dayEvents.length} evento${dayEvents.length!==1?'s':''}
        </div>
        ${!isThisWeek ? `<div style="position:absolute;top:4px;right:4px;font-size:9px;opacity:0.4">próxima</div>` : ''}
      </div>
    `;
  }
  
  document.getElementById('weekGrid').innerHTML = html;
}

function renderTasksHome() {
  const tasksList = tasks.sort((a, b) => {
    const aDate = new Date(a.date + ' ' + a.time);
    const bDate = new Date(b.date + ' ' + b.time);
    return aDate - bDate;
  });
  
  let html = '';
  
  if (tasksList.length === 0) {
    html = '<div class="empty-state">Sin tareas pendientes</div>';
  } else {
    tasksList.slice(0, 5).forEach(t => {
      const d = new Date(t.date);
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const daysLeft = Math.floor((d - today) / (1000 * 60 * 60 * 24));
      
      const c = consultants.find(x => x.id === t.consultant);
      const color = c ? COLORS[consultants.indexOf(c) % 10] : 'var(--text-muted)';
      
      let urgColor = 'var(--ok)';
      if (daysLeft <= 0) urgColor = 'var(--danger)';
      else if (daysLeft <= 3) urgColor = 'var(--orange)';
      else if (daysLeft <= 7) urgColor = 'var(--warn)';
      
      html += `
        <div class="task-card" style="border-left:3px solid ${urgColor};background:${t.color}11" onclick="editEvent('${t.id}')">
          <div style="flex:1">
            <div class="task-title" style="color:${t.color}">${t.title}</div>
            <div class="task-meta">
              ${c ? `<span class="task-consultant-badge" style="background:${color}">${c.name}</span>` : ''}
              ${t.date} ${t.time} · ${t.type}
            </div>
          </div>
        </div>
      `;
    });
  }
  
  document.getElementById('tasksHome').innerHTML = html;
}

function renderDocuments() {
  if (!selectedConsultantForChat) {
    document.getElementById('documentsContent').innerHTML = '<div class="empty-state">Selecciona un consultor</div>';
    return;
  }
  
  const c = consultants.find(x => x.id === selectedConsultantForChat);
  const i = consultants.indexOf(c);
  const color = COLORS[i % 10];
  
  let html = `
    <div style="background:${color}15;border:1px solid ${color}44;border-radius:4px;padding:14px;margin-bottom:16px;border-left:3px solid ${color}">
      <div style="font-size:14px;font-weight:600;color:${color};margin-bottom:4px">${c.name}</div>
      <div style="font-size:11px;color:var(--text-muted)">${c.area}</div>
    </div>
    
    <div class="section-title">Documentos</div>
    <div class="drop-zone" id="dropZone">
      <div style="font-size:24px;margin-bottom:8px">📄</div>
      <p>Arrastra documentos aquí</p>
    </div>
    
    <div id="docList"></div>
  `;
  
  document.getElementById('documentsContent').innerHTML = html;
  
  const docs = c.documents || [];
  let docsHtml = '';
  docs.forEach((doc, idx) => {
    docsHtml += `
      <div class="doc-item">
        <div>
          <div class="doc-name">📄 ${doc.name}</div>
          <div class="doc-date">${doc.date}</div>
        </div>
        <button class="btn-small" onclick="removeDoc('${c.id}', ${idx})">✕</button>
      </div>
    `;
  });
  document.getElementById('docList').innerHTML = docsHtml || '<div class="empty-state">Sin documentos</div>';
  
  setupDropZone(c.id);
}

function renderInfo() {
  if (!selectedConsultantForChat) {
    document.getElementById('infoContent').innerHTML = '<div class="empty-state">Selecciona un consultor</div>';
    return;
  }
  
  const c = consultants.find(x => x.id === selectedConsultantForChat);
  const i = consultants.indexOf(c);
  const color = COLORS[i % 10];
  const hasContract = c.contract;
  
  let html = `
    <div style="background:${color}15;border:1px solid ${color}44;border-radius:4px;padding:14px;margin-bottom:16px;border-left:3px solid ${color}">
      <div style="font-size:14px;font-weight:600;color:${color};margin-bottom:4px">${c.name}</div>
      <div style="font-size:11px;color:var(--text-muted)">${c.area}</div>
    </div>
    
    <div class="section-title">Contacto</div>
    <div class="field">
      <label>Teléfono</label>
      <input type="tel" value="${c.phone || ''}" placeholder="+52 1234567890" onchange="updateConsultantInfo('${c.id}', 'phone', this.value)" style="resize:none;min-height:auto;height:auto;padding:6px">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" value="${c.email || ''}" placeholder="consultor@empresa.com" onchange="updateConsultantInfo('${c.id}', 'email', this.value)" style="resize:none;min-height:auto;height:auto;padding:6px">
    </div>
    <div class="field">
      <label>Horarios</label>
      <textarea onchange="updateConsultantInfo('${c.id}', 'schedule', this.value)">${c.schedule || ''}</textarea>
    </div>
    
    <div class="section-title">Contrato</div>
    ${hasContract ? `
      <div class="doc-item" style="margin-bottom:14px">
        <div>
          <div class="doc-name">📋 ${hasContract.name}</div>
          <div class="doc-date">${hasContract.date}</div>
        </div>
        <button class="btn-small" onclick="removeContract('${c.id}')">✕</button>
      </div>
      <button class="btn-small" style="background:var(--accent);color:var(--bg);margin-bottom:16px;width:100%" onclick="downloadContract('${c.id}')">Descargar</button>
    ` : `
      <div class="drop-zone" id="contractZone" style="margin-bottom:14px;cursor:pointer">
        <div style="font-size:20px;margin-bottom:8px">📋</div>
        <p>Arrastra contrato aquí</p>
      </div>
    `}
    
    <div style="flex:1"></div>
    <button class="btn-delete-consultant" onclick="deleteConsultant('${c.id}')">Eliminar</button>
  `;
  
  const container = document.getElementById('infoContent');
  container.innerHTML = html;
  
  if (!hasContract) {
    const cz = document.getElementById('contractZone');
    if (cz) {
      cz.addEventListener('dragover', e => { e.preventDefault(); cz.classList.add('dragover'); });
      cz.addEventListener('dragleave', () => cz.classList.remove('dragover'));
      cz.addEventListener('drop', e => {
        e.preventDefault();
        cz.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file) uploadContract(c.id, file);
      });
    }
  }
}

// CONSULTORES
function openAddConsultant() {
  openModal('modalAddConsultant');
  setTimeout(() => document.getElementById('newConsultantName').focus(), 100);
}

function addConsultant() {
  const name = document.getElementById('newConsultantName').value.trim();
  const area = document.getElementById('newConsultantArea').value.trim();
  
  if (!name || !area) return;
  
  consultants.push({
    id: 'c_' + Date.now(),
    name,
    area,
    phone: '',
    email: '',
    schedule: '',
    documents: [],
    contract: null
  });
  
  saveData();
  closeModal('modalAddConsultant');
  updateSidebar();
  updateEventConsultantSelect();
  
  document.getElementById('newConsultantName').value = '';
  document.getElementById('newConsultantArea').value = '';
}

function deleteConsultant(id) {
  if (confirm('¿Eliminar este consultor?')) {
    consultants = consultants.filter(c => c.id !== id);
    tasks = tasks.filter(t => t.consultant !== id);
    saveData();
    selectedConsultantForChat = null;
    updateSidebar();
    renderInfo();
  }
}

function updateConsultantInfo(id, field, value) {
  const c = consultants.find(x => x.id === id);
  if (c) {
    c[field] = value;
    saveData();
  }
}

function uploadContract(id, file) {
  const c = consultants.find(x => x.id === id);
  if (c) {
    const reader = new FileReader();
    reader.onload = (e) => {
      c.contract = {
        name: file.name,
        date: new Date().toLocaleDateString('es-MX'),
        data: e.target.result
      };
      saveData();
      renderInfo();
    };
    reader.readAsDataURL(file);
  }
}

function removeContract(id) {
  const c = consultants.find(x => x.id === id);
  if (c) {
    delete c.contract;
    saveData();
    renderInfo();
  }
}

function downloadContract(id) {
  const c = consultants.find(x => x.id === id);
  if (c && c.contract) {
    const link = document.createElement('a');
    link.href = c.contract.data;
    link.download = c.contract.name;
    link.click();
  }
}

function removeDoc(id, idx) {
  const c = consultants.find(x => x.id === id);
  if (c && c.documents) {
    c.documents.splice(idx, 1);
    saveData();
    renderDocuments();
  }
}

function setupDropZone(id) {
  const dz = document.getElementById('dropZone');
  if (!dz) return;
  
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) {
      const c = consultants.find(x => x.id === id);
      if (!c.documents) c.documents = [];
      c.documents.push({
        name: file.name,
        date: new Date().toLocaleDateString('es-MX'),
        size: Math.round(file.size / 1024) + 'KB'
      });
      saveData();
      renderDocuments();
    }
  });
}

// EVENTOS
function openEventModal(date) {
  document.getElementById('eventDate').value = date;
  document.getElementById('eventTime').value = '09:00';
  eventColorSelected = '#c8e060';
  renderColorPicker();
  updateEventConsultantSelect();
  openModal('modalAddEvent');
  setTimeout(() => document.getElementById('eventDesc').focus(), 100);
}

function updateEventConsultantSelect() {
  const sel = document.getElementById('eventConsultant');
  sel.innerHTML = '<option value="">General</option>' + 
    consultants.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
}

function renderColorPicker() {
  const cp = document.getElementById('colorPicker');
  cp.innerHTML = Object.entries(EVENT_COLORS).map(([color, name]) => `
    <div class="color-option ${color === eventColorSelected ? 'selected' : ''}" style="background:${color}" onclick="eventColorSelected='${color}';renderColorPicker()"></div>
  `).join('');
}

function addEvent() {
  const title = document.getElementById('eventDesc').value.trim();
  const date = document.getElementById('eventDate').value;
  const time = document.getElementById('eventTime').value;
  const consultant = document.getElementById('eventConsultant').value || null;
  const type = document.getElementById('eventType').value;
  
  if (!title || !date) return;
  
  tasks.push({
    id: 't_' + Date.now(),
    title,
    date,
    time,
    consultant,
    type,
    color: eventColorSelected
  });
  
  saveData();
  closeModal('modalAddEvent');
  
  if (activeView === 'dashboard') renderDashboard();
}

function deleteEventFromMenu() {
  if (contextEvent) {
    tasks = tasks.filter(t => t.id !== contextEvent);
    saveData();
    if (activeView === 'dashboard') renderDashboard();
    contextEvent = null;
  }
}

function setEventColor(color) {
  if (contextEvent) {
    const e = tasks.find(t => t.id === contextEvent);
    if (e) {
      e.color = color;
      saveData();
      if (activeView === 'dashboard') renderDashboard();
    }
  }
}

function editEvent(id) {
  contextEvent = id;
  const e = tasks.find(t => t.id === id);
  if (!e) return;
  const menu = document.getElementById('eventColorMenu');
  menu.style.display = 'block';
  menu.style.left = (event.clientX - 100) + 'px';
  menu.style.top = (event.clientY + 10) + 'px';
}

function closeEventMenu() {
  document.getElementById('eventColorMenu').style.display = 'none';
}

document.addEventListener('click', e => {
  if (e.target.id !== 'eventColorMenu' && !e.target.closest('.cal-event-menu')) {
    closeEventMenu();
  }
});

// CHAT
function sendChatMessage() {
  const input = document.getElementById('chatInput');
  const message = input.value.trim();
  
  if (!message) return;
  
  addChatMessage(message, 'user');
  input.value = '';
  
  const dateMatch = message.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if (dateMatch) {
    const date = `20${dateMatch[3]}`.slice(0, 4) + '-' + dateMatch[2].padStart(2, '0') + '-' + dateMatch[1].padStart(2, '0');
    
    tasks.push({
      id: 't_' + Date.now(),
      title: message,
      date,
      time: '09:00',
      consultant: selectedConsultantForChat || null,
      type: 'task',
      color: '#c8e060'
    });
    
    saveData();
    
    const c = consultants.find(x => x.id === selectedConsultantForChat);
    const scope = c ? `para ${c.name}` : 'general';
    addChatMessage(`✓ Tarea agregada ${scope} para ${date}`, 'assistant');
    
    if (activeView === 'dashboard') renderDashboard();
  } else {
    addChatMessage('Incluye una fecha: ej. "Revisar planos 15/04/2025"', 'assistant');
  }
}

function addChatMessage(text, role) {
  const container = document.getElementById('chatMessages');
  const msg = document.createElement('div');
  msg.className = 'msg ' + role;
  msg.innerHTML = `
    <div class="msg-label">${role === 'user' ? 'Tú' : 'Asistente'}</div>
    <div class="msg-bubble">${text}</div>
  `;
  container.appendChild(msg);
  container.scrollTop = container.scrollHeight;
}

function toggleChat() {
  const chat = document.getElementById('chatContainer');
  chat.classList.toggle('chat-collapsed');
}

function autoResizeChat(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 80) + 'px';
}

// MODAL
function openModal(id) {
  document.getElementById(id).className = 'modal-overlay open';
}

function closeModal(id) {
  document.getElementById(id).className = 'modal-overlay';
}

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => {
    if (e.target === m) m.className = 'modal-overlay';
  });
});

// INIT
function init() {
  loadData();
  updateSidebar();
  updateEventConsultantSelect();
  renderDashboard();
  renderColorPicker();
}

init();
</script>

</body>
</html>
