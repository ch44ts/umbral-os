<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umbral OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #0e0f0c;
  --surface: #161710;
  --card: #1c1e17;
  --border: #2a2d22;
  --accent: #c8e060;
  --accent-dim: #a8bc4a;
  --text: #e8eadf;
  --text-muted: #7a7d6e;
  --text-faint: #3d3f35;
  --ok: #60c882;
  --warn: #e0b060;
  --danger: #e06060;
  --orange: #e08040;
}

html, body {
  height: 100%;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

header {
  padding: 13px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 11px;
  background: var(--surface);
  flex-shrink: 0;
}

header h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 19px;
  color: var(--accent);
  cursor: pointer;
  transition: opacity 0.2s;
}

header h1:hover {
  opacity: 0.8;
}

header span {
  font-size: 9px;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.layout-wrapper {
  display: flex;
  flex: 1;
  overflow: hidden;
}

.sidebar {
  width: 240px;
  border-right: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-section {
  padding: 9px 13px 7px;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.btn-add {
  background: none;
  border: 1px solid var(--border);
  color: var(--accent);
  font-family: 'DM Mono', monospace;
  font-size: 15px;
  width: 21px;
  height: 21px;
  border-radius: 3px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.btn-add:hover {
  background: rgba(200, 224, 96, 0.1);
}

.consultant-list {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
}

.consultant-item {
  padding: 8px 13px;
  cursor: pointer;
  border-bottom: 1px solid var(--text-faint);
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.consultant-item:hover {
  background: rgba(200, 224, 96, 0.05);
}

.consultant-item.active {
  background: rgba(200, 224, 96, 0.08);
  border-left: 3px solid var(--accent);
  padding-left: 10px;
}

.c-avatar {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 500;
  flex-shrink: 0;
}

.c-info {
  flex: 1;
  min-width: 0;
}

.c-name {
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-size: 10.5px;
}

/* MAIN CONTENT - TABS */
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.tab {
  padding: 8px 13px;
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
}

.tab:hover {
  color: var(--text);
}

.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.view {
  flex: 1;
  overflow: hidden;
  display: none;
}

.view.active {
  display: flex;
}

/* CALENDAR VIEW */
.calendar-view {
  flex-direction: column;
  overflow: hidden;
}

.cal-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}

.cal-header h3 {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.cal-nav {
  display: flex;
  gap: 8px;
}

.cal-nav button {
  padding: 4px 10px;
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  cursor: pointer;
  border-radius: 3px;
  font-size: 10px;
  transition: all 0.2s;
}

.cal-nav button:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.calendar-grid {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.cal-days-row {
  display: grid;
  grid-template-columns: 50px repeat(7, 1fr);
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.cal-day-header {
  padding: 10px 4px;
  text-align: center;
  font-size: 8px;
  color: var(--text-muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 4px;
}

.cal-day-header:first-child {
  border-right: 1px solid var(--border);
}

.cal-day-header:last-child {
  border-right: none;
}

.cal-day-header .day-name {
  font-weight: 600;
}

.cal-day-header .day-num {
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
}

.cal-day-header.today {
  background: rgba(200, 224, 96, 0.1);
  border-radius: 0;
}

.cal-day-header.today .day-num {
  background: var(--accent);
  color: var(--bg);
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.cal-hours-wrapper {
  flex: 1;
  overflow-y: auto;
  display: flex;
  scrollbar-width: thin;
}

.cal-time-labels {
  width: 50px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.cal-time-label {
  height: 48px;
  padding: 4px;
  text-align: right;
  font-size: 8px;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: flex-end;
  line-height: 1;
}

.cal-days-content {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 0;
}

.cal-day-column {
  border-right: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}

.cal-day-column:last-child {
  border-right: none;
}

.cal-hours-column {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.cal-slot {
  height: 48px;
  border-bottom: 1px solid var(--border);
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
}

.cal-slot:hover {
  background: rgba(200, 224, 96, 0.05);
}

.cal-slot:last-child {
  border-bottom: none;
}

.cal-event {
  position: absolute;
  left: 2px;
  right: 2px;
  padding: 2px 4px;
  border-radius: 2px;
  font-size: 8px;
  font-weight: 500;
  color: white;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.2s;
}

.cal-event:hover {
  filter: brightness(1.15);
  z-index: 10;
}

/* CHAT - CENTRADO COMO CORAZON */
.chat-center {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  background: rgba(0, 0, 0, 0.3);
}

.chat-window {
  width: 100%;
  max-width: 700px;
  height: 75%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.7);
}

.chat-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.chat-header h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 16px;
  color: var(--accent);
  letter-spacing: 1px;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scrollbar-width: thin;
}

.msg {
  display: flex;
  flex-direction: column;
  gap: 3px;
  animation: fadeUp 0.3s ease;
  max-width: 85%;
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(6px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.msg-label {
  font-size: 7px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-faint);
}

.msg.user {
  align-self: flex-end;
}

.msg.user .msg-label {
  color: var(--accent);
  text-align: right;
}

.msg-bubble {
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 11px;
  line-height: 1.5;
}

.msg.user .msg-bubble {
  background: var(--accent);
  color: var(--bg);
  font-weight: 500;
}

.msg.assistant .msg-bubble {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text-muted);
}

.chat-input-area {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  flex-shrink: 0;
}

.chat-input-wrap {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  display: flex;
  align-items: flex-end;
  padding: 0 12px;
}

.chat-input-wrap textarea {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 10px 0;
  resize: none;
  outline: none;
  max-height: 100px;
}

.chat-input-wrap textarea::placeholder {
  color: var(--text-faint);
}

.chat-send-btn {
  padding: 0;
  width: 32px;
  height: 32px;
  background: var(--accent);
  border: none;
  color: var(--bg);
  cursor: pointer;
  font-size: 16px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  font-weight: 600;
}

.chat-send-btn:hover {
  background: var(--accent-dim);
  transform: scale(1.05);
}

/* OTROS VIEWS */
.side-view {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  scrollbar-width: thin;
}

.section-title {
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.drop-zone {
  border: 1px dashed var(--border);
  border-radius: 4px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--card);
  margin-bottom: 16px;
}

.drop-zone:hover,
.drop-zone.dragover {
  border-color: var(--accent);
  background: rgba(200, 224, 96, 0.05);
}

.drop-zone p {
  font-size: 9px;
  color: var(--text-faint);
  margin: 0;
  letter-spacing: 0.5px;
}

.drop-zone .icon {
  font-size: 16px;
  margin-bottom: 6px;
  opacity: 0.4;
}

.field {
  margin-bottom: 12px;
}

.field label {
  display: block;
  font-size: 8px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.field input,
.field select,
.field textarea {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 8px;
  outline: none;
  border-radius: 3px;
  resize: vertical;
}

.field input:focus,
.field select:focus,
.field textarea:focus {
  border-color: var(--accent);
}

.field select option {
  background: var(--card);
}

/* TABLA INDEX */
.table-container {
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 16px;
}

.table-header {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.table-row {
  display: flex;
  border-bottom: 1px solid var(--text-faint);
  align-items: stretch;
}

.table-row:hover {
  background: rgba(200, 224, 96, 0.02);
}

.table-cell {
  flex: 1;
  padding: 10px;
  border-right: 1px solid var(--border);
  font-size: 10px;
  display: flex;
  align-items: center;
  min-height: 44px;
}

.table-cell:last-child {
  border-right: none;
}

.table-cell-header {
  font-weight: 600;
  font-size: 8px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-muted);
}

.table-cell input {
  width: 100%;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  outline: none;
  padding: 0;
}

.table-cell input:focus {
  border-bottom: 1px solid var(--accent);
  padding-bottom: 2px;
}

.table-cell input[type="checkbox"] {
  width: auto;
  cursor: pointer;
  margin: 0;
}

.table-cell-actions {
  display: flex;
  gap: 4px;
}

.btn-small {
  padding: 4px 6px;
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  cursor: pointer;
  border-radius: 2px;
  font-size: 8px;
  transition: all 0.2s;
}

.btn-small:hover {
  border-color: var(--danger);
  color: var(--danger);
}

.btn-primary {
  padding: 8px 14px;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 3px;
  cursor: pointer;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: all 0.2s;
}

.btn-primary:hover {
  background: var(--accent-dim);
}

.btn-danger {
  width: 80px;
  padding: 12px 8px;
  background: var(--danger);
  color: white;
  border: none;
  border-radius: 3px;
  font-size: 9px;
  cursor: pointer;
  font-weight: 500;
  transition: all 0.2s;
}

.btn-danger:hover {
  background: #dc2626;
}

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-faint);
  font-size: 11px;
}

.info-header {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 14px;
  margin-bottom: 16px;
  border-left: 3px solid var(--accent);
}

.info-header-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 4px;
}

.info-header-area {
  font-size: 11px;
  color: var(--text-muted);
}

.info-container {
  display: flex;
  flex-direction: column;
  height: 100%;
}

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
}

.modal-overlay.open {
  display: flex;
}

.modal {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 20px;
  width: 400px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
}

.modal h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 16px;
  margin-bottom: 14px;
  color: var(--accent);
}

.modal-footer {
  display: flex;
  gap: 8px;
  margin-top: 16px;
  justify-content: flex-end;
}

.btn-ghost {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 8px 14px;
  border-radius: 3px;
  cursor: pointer;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.btn-ghost:hover {
  border-color: var(--text);
  color: var(--text);
}

.doc-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 10px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.doc-name {
  font-size: 10px;
  color: var(--text);
}

.doc-date {
  font-size: 8px;
  color: var(--text-muted);
  margin-top: 2px;
}
</style>
</head>
<body>

<header>
  <h1 onclick="goToDashboard()">Umbral OS</h1>
  <span>v4 · Ejecutivo</span>
</header>

<div class="layout-wrapper">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">
      Consultores
      <button class="btn-add" onclick="openAddConsultant()">+</button>
    </div>
    <div class="consultant-list" id="consultantList"></div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content">
    <div class="tabs">
      <div class="tab active" data-view="calendar" onclick="switchView('calendar')">📅 Calendario</div>
      <div class="tab" data-view="chat" onclick="switchView('chat')">💬 Chat</div>
      <div class="tab" data-view="documents" onclick="switchView('documents')">📁 Documentos</div>
      <div class="tab" data-view="index" onclick="switchView('index')">📐 Index</div>
      <div class="tab" data-view="info" onclick="switchView('info')">⚙️ Info</div>
    </div>

    <!-- CALENDAR VIEW -->
    <div class="view active" id="view-calendar">
      <div class="cal-header">
        <h3>Semana de <span id="calWeekLabel"></span></h3>
        <div class="cal-nav">
          <button onclick="calPrevWeek()">← Anterior</button>
          <button onclick="calToday()">Hoy</button>
          <button onclick="calNextWeek()">Próxima →</button>
        </div>
      </div>
      
      <div class="calendar-grid">
        <div class="cal-days-row" id="calDaysRow"></div>
        
        <div class="cal-hours-wrapper">
          <div class="cal-time-labels" id="calTimeLabels"></div>
          <div class="cal-days-content" id="calDaysContent"></div>
        </div>
      </div>
    </div>

    <!-- CHAT VIEW - CENTRADO -->
    <div class="view" id="view-chat">
      <div class="chat-center">
        <div class="chat-window">
          <div class="chat-header">
            <h3>Chat</h3>
          </div>
          
          <div class="chat-messages" id="chatMessages"></div>
          
          <div class="chat-input-area">
            <div class="chat-input-wrap">
              <textarea id="chatInput" placeholder="Pregunta o agrega tarea..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMessage()}" oninput="autoResizeChat(this)"></textarea>
            </div>
            <button class="chat-send-btn" onclick="sendChatMessage()" title="Enviar">↑</button>
          </div>
        </div>
      </div>
    </div>

    <!-- DOCUMENTS VIEW -->
    <div class="view" id="view-documents">
      <div class="side-view">
        <div id="documentsContent"></div>
      </div>
    </div>

    <!-- INDEX VIEW -->
    <div class="view" id="view-index">
      <div class="side-view">
        <div class="section-title">Índice de Planos</div>
        <div style="display:flex;gap:8px;margin-bottom:16px">
          <button class="btn-primary" onclick="addIndexRow()">+ Agregar Plano</button>
        </div>
        <div class="table-container" id="indexTable"></div>
      </div>
    </div>

    <!-- INFO VIEW -->
    <div class="view" id="view-info">
      <div class="side-view">
        <div id="infoContent"></div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL AGREGAR CONSULTOR -->
<div class="modal-overlay" id="modalAddConsultant">
  <div class="modal">
    <h3>Agregar Consultor</h3>
    <div class="field">
      <label>Nombre</label>
      <input type="text" id="newConsultantName" placeholder="Ej. Ing. García">
    </div>
    <div class="field">
      <label>Área / Especialidad</label>
      <input type="text" id="newConsultantArea" placeholder="Ej. Estructural">
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('modalAddConsultant')">Cancelar</button>
      <button class="btn-primary" onclick="addConsultant()">Agregar</button>
    </div>
  </div>
</div>

<!-- MODAL AGREGAR EVENTO -->
<div class="modal-overlay" id="modalAddEvent">
  <div class="modal">
    <h3>Agregar Evento</h3>
    <div class="field">
      <label>Descripción</label>
      <textarea id="eventDesc" placeholder="Ej. Entrega de planos" style="min-height:60px"></textarea>
    </div>
    <div class="field">
      <label>Consultor (opcional)</label>
      <select id="eventConsultant">
        <option value="">General</option>
      </select>
    </div>
    <div class="field">
      <label>Fecha y Hora</label>
      <input type="datetime-local" id="eventDateTime">
    </div>
    <div class="field">
      <label>Tipo</label>
      <select id="eventType">
        <option>Tarea</option>
        <option>Reunión</option>
        <option>Entrega</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('modalAddEvent')">Cancelar</button>
      <button class="btn-primary" onclick="addEvent()">Agregar</button>
    </div>
  </div>
</div>

<script>
const COLORS = ['#c8e060', '#a060e0', '#e0a060', '#60a0e0', '#e06060', '#a0c860', '#60c8c8', '#c860c8'];
const HOURS = ['08:00', '09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00', '18:00', '19:00'];

let consultants = [];
let tasks = [];
let selectedConsultantForChat = null;
let activeView = 'calendar';
let calWeekStart = new Date();
calWeekStart.setDate(calWeekStart.getDate() - calWeekStart.getDay());

// DATA
function loadData() {
  const c = localStorage.getItem('umbral_consultants');
  const t = localStorage.getItem('umbral_tasks');
  consultants = c ? JSON.parse(c) : [];
  tasks = t ? JSON.parse(t) : [];
}

function saveData() {
  localStorage.setItem('umbral_consultants', JSON.stringify(consultants));
  localStorage.setItem('umbral_tasks', JSON.stringify(tasks));
}

function goToDashboard() {
  selectedConsultantForChat = null;
  switchView('calendar');
  updateSidebar();
}

// SIDEBAR
function updateSidebar() {
  const list = document.getElementById('consultantList');
  list.innerHTML = consultants.map((c, i) => `
    <div class="consultant-item ${selectedConsultantForChat === c.id ? 'active' : ''}" onclick="selectConsultant('${c.id}')">
      <div class="c-avatar" style="background:${COLORS[i%8]};color:var(--bg)">${c.name.charAt(0)}</div>
      <div class="c-info">
        <div class="c-name">${c.name}</div>
        <div style="font-size:8px;color:var(--text-muted)">${c.area}</div>
      </div>
    </div>
  `).join('');
}

function selectConsultant(id) {
  selectedConsultantForChat = id;
  updateSidebar();
  if (activeView === 'documents') renderDocuments();
  else if (activeView === 'info') renderInfo();
}

// VIEWS
function switchView(v) {
  activeView = v;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === v));
  document.querySelectorAll('.view').forEach(v2 => v2.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  
  if (v === 'calendar') renderCalendar();
  else if (v === 'chat') focusChat();
  else if (v === 'documents') renderDocuments();
  else if (v === 'index') renderIndex();
  else if (v === 'info') renderInfo();
}

// CALENDAR
function renderCalendar() {
  const days = [];
  const dayNames = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
  
  for (let i = 0; i < 7; i++) {
    const d = new Date(calWeekStart);
    d.setDate(d.getDate() + i);
    days.push(d);
  }
  
  // Headers (7 días)
  let headerHtml = '<div class="cal-day-header"></div>';
  days.forEach(d => {
    const isToday = d.toDateString() === new Date().toDateString();
    headerHtml += `
      <div class="cal-day-header ${isToday ? 'today' : ''}">
        <div class="day-name">${dayNames[d.getDay()]}</div>
        <div class="day-num">${d.getDate()}</div>
      </div>
    `;
  });
  document.getElementById('calDaysRow').innerHTML = headerHtml;
  
  // Time labels (izquierda)
  let timeLabelHtml = '';
  HOURS.forEach(hour => {
    timeLabelHtml += `<div class="cal-time-label">${hour}</div>`;
  });
  document.getElementById('calTimeLabels').innerHTML = timeLabelHtml;
  
  // Days content (7 columnas x horas)
  let contentHtml = '';
  days.forEach(d => {
    const dateStr = d.toISOString().split('T')[0];
    contentHtml += `<div class="cal-day-column">`;
    
    HOURS.forEach(hour => {
      const dayTasks = tasks.filter(t => t.date === dateStr && t.time.startsWith(hour.split(':')[0]));
      
      contentHtml += `<div class="cal-slot" onclick="openEventModal('${dateStr}', '${hour}')">`;
      dayTasks.forEach(t => {
        contentHtml += `<div class="cal-event" style="background:${t.color}" title="${t.title}" onclick="event.stopPropagation();editEvent('${t.id}')">${t.title}</div>`;
      });
      contentHtml += '</div>';
    });
    
    contentHtml += '</div>';
  });
  document.getElementById('calDaysContent').innerHTML = contentHtml;
  
  // Update week label
  const weekEnd = new Date(calWeekStart);
  weekEnd.setDate(weekEnd.getDate() + 6);
  document.getElementById('calWeekLabel').textContent = `${calWeekStart.getDate()}/${calWeekStart.getMonth()+1} - ${weekEnd.getDate()}/${weekEnd.getMonth()+1}`;
}

function calPrevWeek() {
  calWeekStart.setDate(calWeekStart.getDate() - 7);
  renderCalendar();
}

function calNextWeek() {
  calWeekStart.setDate(calWeekStart.getDate() + 7);
  renderCalendar();
}

function calToday() {
  calWeekStart = new Date();
  calWeekStart.setDate(calWeekStart.getDate() - calWeekStart.getDay());
  renderCalendar();
}

// CHAT
function sendChatMessage() {
  const input = document.getElementById('chatInput');
  const message = input.value.trim();
  
  if (!message) return;
  
  addChatMessage(message, 'user');
  input.value = '';
  
  const dateMatch = message.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if (dateMatch) {
    const date = `20${dateMatch[3]}`.slice(0, 4) + '-' + dateMatch[2].padStart(2, '0') + '-' + dateMatch[1].padStart(2, '0');
    
    tasks.push({
      id: 't_' + Date.now(),
      title: message,
      date,
      time: '09:00',
      consultant: selectedConsultantForChat || null,
      type: 'task',
      color: '#c8e060'
    });
    
    saveData();
    const c = consultants.find(x => x.id === selectedConsultantForChat);
    const scope = c ? `para ${c.name}` : 'general';
    addChatMessage(`✓ Tarea agregada ${scope} para ${date}`, 'assistant');
    
    if (activeView === 'calendar') renderCalendar();
  } else {
    addChatMessage('Incluye una fecha: ej. "Revisar planos 15/04/2025"', 'assistant');
  }
}

function addChatMessage(text, role) {
  const container = document.getElementById('chatMessages');
  const msg = document.createElement('div');
  msg.className = 'msg ' + role;
  msg.innerHTML = `
    <div class="msg-label">${role === 'user' ? 'Tú' : 'Asistente'}</div>
    <div class="msg-bubble">${text}</div>
  `;
  container.appendChild(msg);
  container.scrollTop = container.scrollHeight;
}

function focusChat() {
  setTimeout(() => document.getElementById('chatInput').focus(), 100);
}

function autoResizeChat(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 80) + 'px';
}

// DOCUMENTS
function renderDocuments() {
  if (!selectedConsultantForChat) {
    document.getElementById('documentsContent').innerHTML = '<div class="empty-state">Selecciona un consultor</div>';
    return;
  }
  
  const c = consultants.find(x => x.id === selectedConsultantForChat);
  const i = consultants.indexOf(c);
  const color = COLORS[i % 8];
  
  let html = `
    <div class="info-header" style="border-left-color:${color}">
      <div class="info-header-name">${c.name}</div>
      <div class="info-header-area">${c.area}</div>
    </div>
    
    <div class="section-title">Documentos</div>
    <div class="drop-zone" id="dropZone">
      <div class="icon">📄</div>
      <p>Arrastra documentos aquí</p>
    </div>
    
    <div id="docList"></div>
  `;
  
  document.getElementById('documentsContent').innerHTML = html;
  
  const docs = c.documents || [];
  let docsHtml = '';
  docs.forEach((doc, idx) => {
    docsHtml += `
      <div class="doc-item">
        <div>
          <div class="doc-name">📄 ${doc.name}</div>
          <div class="doc-date">${doc.date}</div>
        </div>
        <button class="btn-small" onclick="removeDoc('${c.id}', ${idx})">✕</button>
      </div>
    `;
  });
  document.getElementById('docList').innerHTML = docsHtml || '<div class="empty-state" style="margin:0;padding:20px">Sin documentos</div>';
  
  setupDropZone(c.id);
}

function setupDropZone(id) {
  const dz = document.getElementById('dropZone');
  if (!dz) return;
  
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) {
      const c = consultants.find(x => x.id === id);
      if (!c.documents) c.documents = [];
      c.documents.push({
        name: file.name,
        date: new Date().toLocaleDateString('es-MX')
      });
      saveData();
      renderDocuments();
    }
  });
}

function removeDoc(id, idx) {
  const c = consultants.find(x => x.id === id);
  if (c && c.documents) {
    c.documents.splice(idx, 1);
    saveData();
    renderDocuments();
  }
}

// INDEX
function renderIndex() {
  if (!selectedConsultantForChat) {
    document.getElementById('indexTable').innerHTML = '<div class="empty-state">Selecciona un consultor</div>';
    return;
  }
  
  const c = consultants.find(x => x.id === selectedConsultantForChat);
  const index = c.index || [];
  
  let html = `
    <div class="table-header">
      <div class="table-cell table-cell-header" style="flex:0.8">Clave</div>
      <div class="table-cell table-cell-header" style="flex:2">Descripción</div>
      <div class="table-cell table-cell-header" style="flex:1">Fecha Entrega</div>
      <div class="table-cell table-cell-header" style="flex:0.5">✓</div>
      <div class="table-cell table-cell-header" style="flex:0.5">Rev</div>
      <div class="table-cell table-cell-header" style="flex:0.3;border:none"></div>
    </div>
  `;
  
  index.forEach((p, i) => {
    html += `
      <div class="table-row">
        <div class="table-cell" style="flex:0.8"><input type="text" value="${p.clave || ''}" onchange="updateIndex('${c.id}', ${i}, 'clave', this.value)"></div>
        <div class="table-cell" style="flex:2"><input type="text" value="${p.nombre || ''}" onchange="updateIndex('${c.id}', ${i}, 'nombre', this.value)"></div>
        <div class="table-cell" style="flex:1"><input type="date" value="${p.fecha || ''}" onchange="updateIndex('${c.id}', ${i}, 'fecha', this.value)"></div>
        <div class="table-cell" style="flex:0.5;justify-content:center"><input type="checkbox" ${p.delivered ? 'checked' : ''} onchange="updateIndex('${c.id}', ${i}, 'delivered', this.checked)"></div>
        <div class="table-cell" style="flex:0.5"><input type="text" value="${p.revision || ''}" onchange="updateIndex('${c.id}', ${i}, 'revision', this.value)" placeholder="v1"></div>
        <div class="table-cell" style="flex:0.3;border:none;padding:0"><button class="btn-small" onclick="removeIndexRow('${c.id}', ${i})">✕</button></div>
      </div>
    `;
  });
  
  document.getElementById('indexTable').innerHTML = html || '<div class="empty-state">Sin planos</div>';
}

function addIndexRow() {
  if (!selectedConsultantForChat) return;
  const c = consultants.find(x => x.id === selectedConsultantForChat);
  if (!c.index) c.index = [];
  c.index.push({clave: '', nombre: '', fecha: '', delivered: false, revision: ''});
  saveData();
  renderIndex();
}

function updateIndex(id, idx, field, value) {
  const c = consultants.find(x => x.id === id);
  if (c && c.index && c.index[idx]) {
    c.index[idx][field] = value;
    saveData();
  }
}

function removeIndexRow(id, idx) {
  const c = consultants.find(x => x.id === id);
  if (c && c.index) {
    c.index.splice(idx, 1);
    saveData();
    renderIndex();
  }
}

// INFO
function renderInfo() {
  if (!selectedConsultantForChat) {
    document.getElementById('infoContent').innerHTML = '<div class="empty-state">Selecciona un consultor</div>';
    return;
  }
  
  const c = consultants.find(x => x.id === selectedConsultantForChat);
  const i = consultants.indexOf(c);
  const color = COLORS[i % 8];
  
  let html = `
    <div class="info-container">
      <div class="info-header" style="border-left-color:${color}">
        <div class="info-header-name">${c.name}</div>
        <div class="info-header-area">${c.area}</div>
      </div>
      
      <div class="section-title">Contacto</div>
      <div class="field">
        <label>Teléfono</label>
        <input type="tel" value="${c.phone || ''}" placeholder="+52 1234567890" onchange="updateConsultantInfo('${c.id}', 'phone', this.value)">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" value="${c.email || ''}" placeholder="consultor@empresa.com" onchange="updateConsultantInfo('${c.id}', 'email', this.value)">
      </div>
      <div class="field">
        <label>Horarios</label>
        <textarea onchange="updateConsultantInfo('${c.id}', 'schedule', this.value)">${c.schedule || ''}</textarea>
      </div>
      
      <div class="section-title">Contrato</div>
      ${c.contract ? `
        <div class="doc-item" style="margin-bottom:14px">
          <div>
            <div class="doc-name">📋 ${c.contract.name}</div>
            <div class="doc-date">${c.contract.date}</div>
          </div>
          <button class="btn-small" onclick="removeContract('${c.id}')">✕</button>
        </div>
      ` : `
        <div class="drop-zone" id="contractZone" style="cursor:pointer">
          <div class="icon">📋</div>
          <p>Arrastra contrato aquí</p>
        </div>
      `}
      
      <div style="flex:1"></div>
      <button class="btn-danger" onclick="deleteConsultant('${c.id}')">Eliminar</button>
    </div>
  `;
  
  const container = document.getElementById('infoContent');
  container.innerHTML = html;
  
  if (!c.contract && document.getElementById('contractZone')) {
    const cz = document.getElementById('contractZone');
    cz.addEventListener('dragover', e => { e.preventDefault(); cz.classList.add('dragover'); });
    cz.addEventListener('dragleave', () => cz.classList.remove('dragover'));
    cz.addEventListener('drop', e => {
      e.preventDefault();
      const file = e.dataTransfer.files[0];
      if (file) uploadContract(c.id, file);
    });
  }
}

function updateConsultantInfo(id, field, value) {
  const c = consultants.find(x => x.id === id);
  if (c) {
    c[field] = value;
    saveData();
  }
}

function uploadContract(id, file) {
  const c = consultants.find(x => x.id === id);
  if (c) {
    const reader = new FileReader();
    reader.onload = (e) => {
      c.contract = {
        name: file.name,
        date: new Date().toLocaleDateString('es-MX'),
        data: e.target.result
      };
      saveData();
      renderInfo();
    };
    reader.readAsDataURL(file);
  }
}

function removeContract(id) {
  const c = consultants.find(x => x.id === id);
  if (c) {
    delete c.contract;
    saveData();
    renderInfo();
  }
}

function deleteConsultant(id) {
  if (confirm('¿Eliminar este consultor?')) {
    consultants = consultants.filter(c => c.id !== id);
    saveData();
    selectedConsultantForChat = null;
    updateSidebar();
    renderInfo();
  }
}

// EVENTOS
function openEventModal(date, time) {
  document.getElementById('eventDateTime').value = date + 'T' + time;
  updateEventConsultantSelect();
  openModal('modalAddEvent');
  setTimeout(() => document.getElementById('eventDesc').focus(), 100);
}

function updateEventConsultantSelect() {
  const sel = document.getElementById('eventConsultant');
  sel.innerHTML = '<option value="">General</option>' + 
    consultants.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
}

function addEvent() {
  const title = document.getElementById('eventDesc').value.trim();
  const dt = document.getElementById('eventDateTime').value;
  const consultant = document.getElementById('eventConsultant').value || null;
  const type = document.getElementById('eventType').value;
  
  if (!title || !dt) return;
  
  const [date, time] = dt.split('T');
  
  tasks.push({
    id: 't_' + Date.now(),
    title,
    date,
    time,
    consultant,
    type,
    color: '#c8e060'
  });
  
  saveData();
  closeModal('modalAddEvent');
  if (activeView === 'calendar') renderCalendar();
}

function editEvent(id) {
  const e = tasks.find(t => t.id === id);
  if (e) {
    // Aquí se abre modal para editar evento
    // Por ahora solo permite ver/eliminar por click derecho
  }
}

// CONSULTORES
function openAddConsultant() {
  openModal('modalAddConsultant');
  setTimeout(() => document.getElementById('newConsultantName').focus(), 100);
}

function addConsultant() {
  const name = document.getElementById('newConsultantName').value.trim();
  const area = document.getElementById('newConsultantArea').value.trim();
  
  if (!name || !area) return;
  
  consultants.push({
    id: 'c_' + Date.now(),
    name,
    area,
    phone: '',
    email: '',
    schedule: '',
    documents: [],
    contract: null,
    index: []
  });
  
  saveData();
  closeModal('modalAddConsultant');
  updateSidebar();
  updateEventConsultantSelect();
  
  document.getElementById('newConsultantName').value = '';
  document.getElementById('newConsultantArea').value = '';
}

// MODALS
function openModal(id) {
  document.getElementById(id).className = 'modal-overlay open';
}

function closeModal(id) {
  document.getElementById(id).className = 'modal-overlay';
}

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => {
    if (e.target === m) m.className = 'modal-overlay';
  });
});

// INIT
function init() {
  loadData();
  updateSidebar();
  updateEventConsultantSelect();
  renderCalendar();
}

init();
</script>

</body>
</html>
