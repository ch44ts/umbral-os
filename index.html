<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umbral OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0e0f0c;
  --surface: #161710;
  --card: #1c1e17;
  --border: #2a2d22;
  --accent: #c8e060;
  --text: #e8eadf;
  --text-muted: #7a7d6e;
}
body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
header { padding: 13px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; background: var(--surface); flex-shrink: 0; }
header h1 { font-family: 'DM Serif Display', serif; font-size: 19px; color: var(--accent); cursor: pointer; }
.layout-wrapper { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 240px; border-right: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; overflow: hidden; }
.sidebar-section { padding: 9px 13px 7px; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.btn-add { background: none; border: 1px solid var(--border); color: var(--accent); font-size: 15px; width: 21px; height: 21px; border-radius: 3px; cursor: pointer; transition: all 0.2s; }
.btn-add:hover { background: rgba(200, 224, 96, 0.1); }
.consultant-list { flex: 1; overflow-y: auto; }
.consultant-item { padding: 8px 13px; cursor: pointer; border-bottom: 1px solid #3d3f35; transition: all 0.15s; display: flex; align-items: center; gap: 8px; }
.consultant-item:hover { background: rgba(200, 224, 96, 0.05); }
.consultant-item.active { background: rgba(200, 224, 96, 0.08); border-left: 3px solid var(--accent); padding-left: 10px; }
.c-avatar { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; flex-shrink: 0; }
.c-info { flex: 1; min-width: 0; }
.c-name { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 10.5px; }
.main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
.tab { padding: 8px 13px; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.view-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding-bottom: 280px; }
.view { flex: 1; overflow: hidden; display: none; }
.view.active { display: flex; }
.calendar-grid { flex: 1; overflow: hidden; display: grid; grid-template-columns: 50px repeat(7, 1fr); grid-template-rows: auto auto 1fr; }
.cal-days-row { display: grid; grid-template-columns: 50px repeat(7, 1fr); border-bottom: 1px solid var(--border); background: var(--surface); grid-column: 1 / -1; }
.cal-day-header { padding: 10px 4px; text-align: center; font-size: 11px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; border-right: 1px solid var(--border); display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 4px; }
.cal-day-header:last-child { border-right: none; }
.cal-day-header .day-num { font-size: 18px; font-weight: 700; color: var(--accent); }
.cal-day-header.today { background: rgba(200, 224, 96, 0.1); }
.cal-day-header.today .day-num { background: var(--accent); color: var(--bg); width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.cal-hours-wrapper { grid-column: 1 / -1; flex: 1; overflow-y: auto; display: flex; }
.cal-time-labels { width: 50px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.cal-time-label { height: 60px; padding: 4px 4px; text-align: right; font-size: 11px; color: var(--text-muted); border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: flex-end; }
.cal-days-content { flex: 1; display: grid; grid-template-columns: repeat(7, 1fr); gap: 0; padding-right: 12px; }
.cal-day-column { border-right: 1px solid var(--border); position: relative; overflow: visible; }
.cal-day-column:last-child { border-right: none; }
.cal-slots { position: relative; height: 100%; }
.cal-slot { height: 60px; border-bottom: 1px solid var(--border); position: relative; cursor: pointer; transition: background 0.2s; }
.cal-slot:hover { background: rgba(200, 224, 96, 0.05); }
.cal-event { position: absolute; left: 2px; right: 2px; padding: 5px 7px; border-radius: 3px; font-size: 11px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: grab; transition: all 0.2s; border: 1px solid rgba(0,0,0,0.2); color: #000; user-select: none; }
.cal-event:hover { filter: brightness(0.95); z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.cal-event-resize { position: absolute; bottom: 0; left: 0; right: 0; height: 4px; cursor: ns-resize; background: rgba(0,0,0,0.3); }
.side-view { flex: 1; overflow-y: auto; padding: 16px 20px; }
.empty-state { text-align: center; padding: 40px 20px; color: #3d3f35; font-size: 11px; }
.chat-bottom { position: fixed; bottom: 0; left: 0; right: 0; height: 280px; background: var(--surface); border-top: 1px solid var(--border); display: flex; flex-direction: column; z-index: 40; }
.chat-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.chat-header h3 { font-family: 'DM Serif Display', serif; font-size: 16px; color: var(--accent); letter-spacing: 0.5px; font-weight: 400; }
.chat-messages { flex: 1; overflow-y: auto; padding: 10px 16px; display: flex; flex-direction: column; gap: 8px; }
.msg { display: flex; flex-direction: column; gap: 2px; max-width: 85%; }
.msg.user { align-self: flex-end; }
.msg-label { font-size: 7px; letter-spacing: 1px; text-transform: uppercase; color: #3d3f35; }
.msg.user .msg-label { color: var(--accent); text-align: right; }
.msg-bubble { padding: 8px 11px; border-radius: 6px; font-size: 10px; line-height: 1.4; }
.msg.user .msg-bubble { background: var(--accent); color: var(--bg); font-weight: 500; }
.msg.assistant .msg-bubble { background: var(--card); border: 1px solid var(--border); color: var(--text-muted); white-space: pre-wrap; }
.chat-input-area { padding: 10px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-shrink: 0; }
.chat-input-wrap { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 4px; display: flex; align-items: flex-end; padding: 0 10px; }
.chat-input-wrap textarea { flex: 1; background: transparent; border: none; color: var(--text); font-family: 'DM Mono', monospace; font-size: 10px; padding: 8px 0; resize: none; outline: none; max-height: 60px; }
.chat-input-wrap textarea::placeholder { color: #3d3f35; }
.chat-send-btn { padding: 6px 10px; background: var(--accent); color: var(--bg); border: none; cursor: pointer; font-size: 12px; border-radius: 3px; font-weight: 600; transition: all 0.2s; }
.chat-send-btn:hover { background: #a8bc4a; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); display: none; align-items: center; justify-content: center; z-index: 200; }
.modal-overlay.open { display: flex; }
.modal { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 20px; width: 400px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
.modal h3 { font-family: 'DM Serif Display', serif; font-size: 16px; margin-bottom: 14px; color: var(--accent); }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
.field input, .field select, .field textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 11px; padding: 8px; outline: none; border-radius: 3px; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.modal-footer { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
.btn-primary { padding: 8px 14px; background: var(--accent); color: var(--bg); border: none; border-radius: 3px; cursor: pointer; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
.btn-primary:hover { background: #a8bc4a; }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 8px 14px; border-radius: 3px; cursor: pointer; font-size: 10px; text-transform: uppercase; }
.btn-ghost:hover { border-color: var(--text); color: var(--text); }
.color-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
.color-option { width: 100%; aspect-ratio: 1; border-radius: 4px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
.color-option:hover { border-color: #fff; }
.color-option.selected { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.5); }
.color-grid-context { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 8px 12px; }
.color-circle { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
.color-circle:hover { transform: scale(1.1); border-color: #fff; }
.context-menu { position: fixed; background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 4px 0; z-index: 300; display: none; min-width: 150px; }
.context-menu.open { display: block; }
.context-menu-item { padding: 6px 12px; cursor: pointer; font-size: 9px; transition: background 0.2s; }
.context-menu-item:hover { background: rgba(200, 224, 96, 0.2); }
</style>
</head>
<body>

<header>
  <h1 onclick="goToDashboard()">Umbral OS</h1>
</header>

<div class="layout-wrapper">
  <div class="sidebar">
    <div class="sidebar-section">
      Consultores
      <button class="btn-add" onclick="openAddConsultant()">+</button>
    </div>
    <div class="consultant-list" id="consultantList"></div>
  </div>

  <div class="main-content">
    <div class="tabs">
      <div class="tab active" data-view="calendar" onclick="switchView('calendar')">📅 Calendario</div>
      <div class="tab" data-view="documents" onclick="switchView('documents')">📁 Documentos</div>
      <div class="tab" data-view="index" onclick="switchView('index')">📐 Index</div>
      <div class="tab" data-view="info" onclick="switchView('info')">⚙️ Info</div>
    </div>

    <div class="view-wrapper">
      <div class="view active" id="view-calendar">
        <div class="calendar-grid">
          <div style="grid-column:1/-1;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:12px;justify-content:space-between">
            <div style="display:flex;align-items:center;gap:8px">
              <button onclick="calPrevWeek()" style="padding:4px 8px;background:none;border:1px solid var(--border);color:var(--text-muted);cursor:pointer;border-radius:3px;font-size:12px;width:24px;height:24px;display:flex;align-items:center;justify-content:center">‹</button>
              <div id="calWeekLabel" style="font-size:13px;color:var(--text);font-weight:600;min-width:120px;text-align:center"></div>
              <button onclick="calNextWeek()" style="padding:4px 8px;background:none;border:1px solid var(--border);color:var(--text-muted);cursor:pointer;border-radius:3px;font-size:12px;width:24px;height:24px;display:flex;align-items:center;justify-content:center">›</button>
            </div>
            <button style="padding:4px 10px;background:none;border:1px solid var(--border);color:var(--text-muted);cursor:pointer;border-radius:3px;font-size:9px;transition:all 0.2s;letter-spacing:0.5px;text-transform:uppercase" onclick="calToday()">Hoy</button>
          </div>
          
          <div class="cal-days-row" id="calDaysRow"></div>
          <div class="cal-hours-wrapper">
            <div class="cal-time-labels" id="calTimeLabels"></div>
            <div class="cal-days-content" id="calDaysContent"></div>
          </div>
        </div>
      </div>

      <div class="view" id="view-documents">
        <div class="side-view" id="documentsContent"></div>
      </div>

      <div class="view" id="view-index">
        <div class="side-view" id="indexContent"></div>
      </div>

      <div class="view" id="view-info">
        <div class="side-view" id="infoContent"></div>
      </div>
    </div>
  </div>
</div>

<div class="chat-bottom">
  <div class="chat-header">
    <h3>Chat Local</h3>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-area">
    <div class="chat-input-wrap">
      <textarea id="chatInput" placeholder="Pregunta sobre consultores, eventos..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMessage()}" oninput="autoResizeChat(this)"></textarea>
    </div>
    <button class="chat-send-btn" onclick="sendChatMessage()">↑</button>
  </div>
</div>

<div class="modal-overlay" id="modalAddEvent">
  <div class="modal">
    <h3>Agregar Evento</h3>
    <div class="field">
      <label>Descripción</label>
      <textarea id="eventDesc" placeholder="Ej. Reunión con García" style="min-height:60px"></textarea>
    </div>
    <div class="field">
      <label>Consultor</label>
      <select id="eventConsultant"><option value="">General</option></select>
    </div>
    <div class="field">
      <label>Color</label>
      <div class="color-grid" id="colorPicker"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('modalAddEvent')">Cancelar</button>
      <button class="btn-primary" onclick="addEvent()">Agregar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalAddConsultant">
  <div class="modal">
    <h3>Agregar Consultor</h3>
    <div class="field">
      <label>Nombre</label>
      <input type="text" id="newConsultantName" placeholder="Ej. Ing. García">
    </div>
    <div class="field">
      <label>Empresa</label>
      <input type="text" id="newConsultantCompany" placeholder="Ej. Constructora XYZ">
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('modalAddConsultant')">Cancelar</button>
      <button class="btn-primary" onclick="addConsultant()">Agregar</button>
    </div>
  </div>
</div>

<div class="context-menu" id="contextMenu">
  <div class="color-grid-context" id="contextColorOptions"></div>
  <div style="border-top:1px solid var(--border);margin-top:4px"></div>
  <div class="context-menu-item" onclick="deleteEvent()">🗑 Eliminar</div>
</div>

<script>
const COLORS = ['#c8e060', '#a060e0', '#e0a060', '#60a0e0', '#e06060', '#a0c860'];
const HOURS = Array.from({length: 12}, (_, i) => `${String(i+8).padStart(2, '0')}:00`);

let consultants = [];
let tasks = [];
let selectedConsultantForChat = null;
let activeView = 'calendar';
let calWeekStart = new Date();
calWeekStart.setDate(calWeekStart.getDate() - calWeekStart.getDay());
let selectedEventColor = COLORS[0];
let eventModalDate = null;
let eventModalTime = null;
let contextMenuEvent = null;

window.addEventListener('load', () => {
  loadData();
  updateSidebar();
  renderCalendar();
  renderColorPicker();
  renderContextColorMenu();
  addChatMessage('Bienvenido a Umbral OS. Pregunta sobre consultores, eventos o el calendario.', 'assistant');
});

function loadData() {
  const c = localStorage.getItem('umbral_consultants');
  const t = localStorage.getItem('umbral_tasks');
  consultants = c ? JSON.parse(c) : [];
  tasks = t ? JSON.parse(t) : [];
}

function saveData() {
  localStorage.setItem('umbral_consultants', JSON.stringify(consultants));
  localStorage.setItem('umbral_tasks', JSON.stringify(tasks));
}

function updateSidebar() {
  const list = document.getElementById('consultantList');
  list.innerHTML = consultants.map((c, i) => `
    <div class="consultant-item ${selectedConsultantForChat === c.id ? 'active' : ''}" onclick="selectConsultant('${c.id}')">
      <div class="c-avatar" style="background:${COLORS[i%6]}">${c.name.charAt(0)}</div>
      <div class="c-info">
        <div class="c-name">${c.name}</div>
        <div style="font-size:8px;color:var(--text-muted)">${c.company}</div>
      </div>
    </div>
  `).join('');
}

function selectConsultant(id) {
  selectedConsultantForChat = selectedConsultantForChat === id ? null : id;
  updateSidebar();
  renderCurrentView();
}

function switchView(view) {
  activeView = view;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-view="${view}"]`).classList.add('active');
  renderCurrentView();
}

function renderCurrentView() {
  if (activeView === 'calendar') renderCalendar();
  else if (activeView === 'documents') renderDocuments();
  else if (activeView === 'index') renderIndex();
  else if (activeView === 'info') renderInfo();
}

function renderColorPicker() {
  const picker = document.getElementById('colorPicker');
  picker.innerHTML = COLORS.map((col, i) => `
    <div class="color-option ${selectedEventColor === col ? 'selected' : ''}" style="background:${col}" onclick="selectedEventColor='${col}';document.querySelectorAll('.color-option').forEach(el=>el.classList.remove('selected'));this.classList.add('selected')"></div>
  `).join('');
}

function renderContextColorMenu() {
  const menu = document.getElementById('contextColorOptions');
  menu.innerHTML = COLORS.map((col, i) => `
    <div class="color-circle" style="background:${col}" onclick="changeEventColor('${col}')"></div>
  `).join('');
}

function updateEventConsultantSelect() {
  const sel = document.getElementById('eventConsultant');
  sel.innerHTML = '<option value="">General</option>' + consultants.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
}

function renderCalendar() {
  const monthNames = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
  const weekEnd = new Date(calWeekStart);
  weekEnd.setDate(weekEnd.getDate() + 6);
  let weekLabel = calWeekStart.getMonth() === weekEnd.getMonth() 
    ? `${monthNames[calWeekStart.getMonth()]} ${calWeekStart.getFullYear()}`
    : `${monthNames[calWeekStart.getMonth()]} - ${monthNames[weekEnd.getMonth()]} ${weekEnd.getFullYear()}`;
  document.getElementById('calWeekLabel').textContent = weekLabel;

  const daysRow = document.getElementById('calDaysRow');
  let daysHtml = '<div></div>';
  for (let i = 0; i < 7; i++) {
    const d = new Date(calWeekStart);
    d.setDate(d.getDate() + i);
    const isToday = d.toDateString() === new Date().toDateString();
    daysHtml += `<div class="cal-day-header ${isToday ? 'today' : ''}">
      <div>${['D', 'L', 'M', 'M', 'J', 'V', 'S'][i]}</div>
      <div class="day-num">${d.getDate()}</div>
    </div>`;
  }
  daysRow.innerHTML = daysHtml;

  const timeLabels = document.getElementById('calTimeLabels');
  timeLabels.innerHTML = '<div></div>' + HOURS.map(h => `<div class="cal-time-label">${h}</div>`).join('');

  const content = document.getElementById('calDaysContent');
  let contentHtml = '';
  for (let day = 0; day < 7; day++) {
    const d = new Date(calWeekStart);
    d.setDate(d.getDate() + day);
    const dateStr = d.toISOString().split('T')[0];
    
    const dayTasks = tasks.filter(t => t.date === dateStr);
    
    let columnHtml = `<div class="cal-day-column" data-date="${dateStr}" ondrop="handleDrop(event)" ondragover="handleDragOver(event)"><div class="cal-slots">`;
    
    for (let hour = 0; hour < HOURS.length; hour++) {
      columnHtml += `<div class="cal-slot" data-hour="${hour}" data-date="${dateStr}" onclick="openEventModal('${dateStr}', ${hour})"></div>`;
    }

    const eventsByHour = {};
    dayTasks.forEach(task => {
      const startHour = parseInt(task.time.split(':')[0]) - 8;
      if (startHour >= 0 && startHour < HOURS.length) {
        if (!eventsByHour[startHour]) eventsByHour[startHour] = [];
        eventsByHour[startHour].push(task);
      }
    });
    
    dayTasks.forEach(task => {
      const startHour = parseInt(task.time.split(':')[0]) - 8;
      const duration = task.duration || 1;
      if (startHour >= 0 && startHour < HOURS.length) {
        const eventsAtHour = eventsByHour[startHour] || [];
        const eventIndex = eventsAtHour.findIndex(t => t.id === task.id);
        const totalEvents = eventsAtHour.length;
        
        const top = startHour * 60 + 2;
        const height = Math.max(20, duration * 60 - 4);
        let width = 100;
        let left = 0;
        
        if (totalEvents > 1) {
          width = 100 / totalEvents;
          left = (width * eventIndex);
        }
        
        const consIdx = consultants.findIndex(c => c.id === task.consultant);
        const bgCol = COLORS[consIdx >= 0 ? consIdx : 0];
        columnHtml += `<div class="cal-event" data-task-id="${task.id}" style="top:${top}px;height:${height}px;left:${left}%;width:${width}%;background:${task.color || bgCol}" draggable="true">
          ${task.title}
          <div class="cal-event-resize"></div>
        </div>`;
      }
    });

    columnHtml += '</div></div>';
    contentHtml += columnHtml;
  }
  content.innerHTML = contentHtml;

  setTimeout(() => {
    document.querySelectorAll('.cal-event').forEach(el => {
      el.addEventListener('dragstart', handleDragStart);
      el.addEventListener('dragend', handleDragEnd);
      el.addEventListener('contextmenu', (e) => {
        const taskId = el.getAttribute('data-task-id');
        showContextMenu(e, taskId);
      });
      
      const resize = el.querySelector('.cal-event-resize');
      if (resize) {
        resize.addEventListener('mousedown', (e) => {
          const taskId = el.getAttribute('data-task-id');
          startResizeEvent(e, taskId);
        });
      }
    });
  }, 0);
}

function handleDragStart(e) {
  if (!e.target.classList.contains('cal-event')) return;
  const taskId = e.target.getAttribute('data-task-id');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('taskId', taskId);
  e.target.style.opacity = '0.5';
}

function handleDragEnd(e) {
  if (e.target.classList.contains('cal-event')) {
    e.target.style.opacity = '1';
  }
}

function handleDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}

function handleDrop(e) {
  e.preventDefault();
  const taskId = e.dataTransfer.getData('taskId');
  if (!taskId) return;
  
  const task = tasks.find(t => t.id === taskId);
  if (!task) return;
  
  const column = e.currentTarget.closest('.cal-day-column');
  if (!column) return;
  
  const newDate = column.getAttribute('data-date');
  
  const slotY = e.clientY - column.querySelector('.cal-slots').getBoundingClientRect().top;
  const slotHeight = 60;
  const hourIndex = Math.floor(slotY / slotHeight);
  
  if (hourIndex >= 0 && hourIndex < HOURS.length) {
    task.date = newDate;
    task.time = HOURS[hourIndex];
    saveData();
    renderCalendar();
  }
}

function startResizeEvent(e, taskId) {
  e.stopPropagation();
  const task = tasks.find(t => t.id === taskId);
  if (!task) return;
  
  const eventEl = document.querySelector(`[data-task-id="${taskId}"]`);
  const startY = e.clientY;
  const startHeight = eventEl.offsetHeight;
  
  const onMouseMove = (me) => {
    const diff = me.clientY - startY;
    const newHeight = Math.max(20, startHeight + diff);
    const newDuration = Math.max(1, Math.round(newHeight / 60));
    task.duration = newDuration;
    renderCalendar();
  };
  
  const onMouseUp = () => {
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
    saveData();
  };
  
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);
}

function openEventModal(date, hour) {
  eventModalDate = date;
  eventModalTime = HOURS[hour];
  document.getElementById('eventDesc').value = '';
  document.getElementById('eventConsultant').value = selectedConsultantForChat || '';
  selectedEventColor = COLORS[0];
  renderColorPicker();
  document.getElementById('modalAddEvent').classList.add('open');
}

function addEvent() {
  const desc = document.getElementById('eventDesc').value.trim();
  if (!desc) return;
  
  tasks.push({
    id: 't_' + Date.now(),
    title: desc,
    date: eventModalDate,
    time: eventModalTime,
    duration: 1,
    consultant: document.getElementById('eventConsultant').value || null,
    color: selectedEventColor
  });
  
  saveData();
  renderCalendar();
  closeModal('modalAddEvent');
  addChatMessage(`✓ Evento "${desc}" agregado`, 'assistant');
}

function showContextMenu(e, taskId) {
  e.preventDefault();
  contextMenuEvent = taskId;
  const menu = document.getElementById('contextMenu');
  menu.style.left = e.clientX + 'px';
  menu.style.top = e.clientY + 'px';
  menu.classList.add('open');
  
  document.addEventListener('click', closeContextMenu);
}

function closeContextMenu() {
  document.getElementById('contextMenu').classList.remove('open');
  document.removeEventListener('click', closeContextMenu);
}

function changeEventColor(color) {
  const event = tasks.find(t => t.id === contextMenuEvent);
  if (event) {
    event.color = color;
    saveData();
    renderCalendar();
  }
  closeContextMenu();
}

function deleteEvent() {
  tasks = tasks.filter(t => t.id !== contextMenuEvent);
  saveData();
  renderCalendar();
  closeContextMenu();
}

function openAddConsultant() {
  document.getElementById('newConsultantName').value = '';
  document.getElementById('newConsultantCompany').value = '';
  document.getElementById('modalAddConsultant').classList.add('open');
}

function addConsultant() {
  const name = document.getElementById('newConsultantName').value.trim();
  const company = document.getElementById('newConsultantCompany').value.trim();
  if (!name) return;
  
  consultants.push({
    id: 'c_' + Date.now(),
    name,
    company,
    email: '',
    phone: '',
    schedule: '',
    documents: [],
    index: []
  });
  
  saveData();
  updateSidebar();
  updateEventConsultantSelect();
  closeModal('modalAddConsultant');
}

function renderDocuments() {
  if (!selectedConsultantForChat) {
    document.getElementById('documentsContent').innerHTML = '<div class="empty-state">Selecciona un consultor</div>';
    return;
  }
  const c = consultants.find(x => x.id === selectedConsultantForChat);
  const docs = c.documents || [];
  let html = `<h2 style="font-family:'DM Serif Display',serif;font-size:16px;margin-bottom:12px;color:var(--accent)">${c.name}</h2>`;
  if (docs.length === 0) {
    html += '<div class="empty-state">Sin documentos</div>';
  } else {
    html += docs.map((d, i) => `<div style="padding:8px;background:var(--card);border:1px solid var(--border);border-radius:3px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
      <div><div style="font-size:10px;color:var(--text)">${d.name}</div><div style="font-size:8px;color:var(--text-muted)">${d.date}</div></div>
    </div>`).join('');
  }
  document.getElementById('documentsContent').innerHTML = html;
}

function renderIndex() {
  if (!selectedConsultantForChat) {
    document.getElementById('indexContent').innerHTML = '<div class="empty-state">Selecciona un consultor</div>';
    return;
  }
  const c = consultants.find(x => x.id === selectedConsultantForChat);
  document.getElementById('indexContent').innerHTML = `<h2 style="font-family:'DM Serif Display',serif;font-size:16px;margin-bottom:12px;color:var(--accent)">${c.name}</h2><p style="color:var(--text-muted)">Index en desarrollo...</p>`;
}

function renderInfo() {
  if (!selectedConsultantForChat) {
    document.getElementById('infoContent').innerHTML = '<div class="empty-state">Selecciona un consultor</div>';
    return;
  }
  const c = consultants.find(x => x.id === selectedConsultantForChat);
  document.getElementById('infoContent').innerHTML = `<h2 style="font-family:'DM Serif Display',serif;font-size:16px;margin-bottom:12px;color:var(--accent)">${c.name}</h2><p style="font-size:10px;color:var(--text)">${c.company}</p>`;
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function goToDashboard() {
  selectedConsultantForChat = null;
  updateSidebar();
  switchView('calendar');
}

function autoResizeChat(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 60) + 'px';
}

function sendChatMessage() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;
  
  addChatMessage(msg, 'user');
  input.value = '';
  input.style.height = 'auto';
  
  const response = callChatLocal(msg);
  setTimeout(() => {
    addChatMessage(response, 'assistant');
  }, 200);
}

function callChatLocal(userMessage) {
  const lowerMsg = userMessage.toLowerCase();
  
  if (lowerMsg.includes('cuántos') && lowerMsg.includes('consultor')) {
    return `Tienes ${consultants.length} consultor${consultants.length !== 1 ? 'es' : ''} en el sistema.`;
  }
  if (lowerMsg.includes('evento') || lowerMsg.includes('tarea')) {
    return `Hay ${tasks.length} evento${tasks.length !== 1 ? 's' : ''} en el calendario.`;
  }
  if (lowerMsg.includes('consultor') && lowerMsg.includes('nombre')) {
    const names = consultants.map(c => c.name).join(', ');
    return names ? `Los consultores son: ${names}` : 'No hay consultores agregados aún.';
  }
  if (lowerMsg.includes('hola') || lowerMsg.includes('hi')) {
    return '¡Hola! Soy tu asistente para Umbral OS. ¿En qué puedo ayudarte?';
  }
  if (lowerMsg.includes('ayuda') || lowerMsg.includes('help')) {
    return 'Puedo ayudarte con:\n• Contar consultores y eventos\n• Información del calendario\n• Preguntas sobre el proyecto\n\nEscribe libremente tus consultas.';
  }
  if (lowerMsg.includes('gracias') || lowerMsg.includes('thanks')) {
    return '¡De nada! Estoy aquí para ayudarte con Umbral OS.';
  }
  
  return 'Pregunta sobre consultores, eventos o el calendario. Escribe "ayuda" para ver opciones.';
}

function addChatMessage(text, role) {
  const container = document.getElementById('chatMessages');
  const msg = document.createElement('div');
  msg.className = 'msg ' + role;
  msg.innerHTML = `<div class="msg-label">${role === 'user' ? 'Tú' : 'Asistente'}</div><div class="msg-bubble">${text}</div>`;
  container.appendChild(msg);
  container.scrollTop = container.scrollHeight;
}

function calPrevWeek() { calWeekStart.setDate(calWeekStart.getDate() - 7); renderCalendar(); }
function calNextWeek() { calWeekStart.setDate(calWeekStart.getDate() + 7); renderCalendar(); }
function calToday() { calWeekStart = new Date(); calWeekStart.setDate(calWeekStart.getDate() - calWeekStart.getDay()); renderCalendar(); }
</script>
