<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maravella OS</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/latest/umd/lucide.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a1a1a;
            --secondary: #2d2d2d;
            --accent: #0066cc;
            --accent-light: #e6f2ff;
            --text-primary: #f5f5f5;
            --text-secondary: #a0a0a0;
            --border: #3a3a3a;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --spacing: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--primary);
            color: var(--text-primary);
            line-height: 1.5;
        }

        #root {
            height: 100vh;
        }

        .container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Panel Izquierdo - Consultores */
        .sidebar {
            width: 280px;
            background: var(--secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: var(--spacing);
            border-bottom: 1px solid var(--border);
        }

        .sidebar-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .add-consultant-btn {
            width: 100%;
            padding: 10px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .add-consultant-btn:hover {
            background: #0052a3;
        }

        .consultants-list {
            flex: 1;
            overflow-y: auto;
            padding: var(--spacing);
        }

        .consultant-item {
            padding: 12px;
            margin-bottom: 8px;
            background: var(--primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .consultant-item:hover {
            border-color: var(--accent);
            background: #252525;
        }

        .consultant-item.active {
            border-left-color: var(--accent);
            background: #1f2937;
        }

        .consultant-item-name {
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .consultant-item-company {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .consultant-item-drag {
            cursor: grab;
            opacity: 0.5;
            padding: 4px;
        }

        /* Panel Principal */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .content-header {
            padding: var(--spacing);
            border-bottom: 1px solid var(--border);
            background: var(--secondary);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .header-title {
            font-size: 24px;
            font-weight: 600;
        }

        .sync-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
            padding: 6px 12px;
            background: var(--primary);
            border-radius: 4px;
        }

        .sync-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .sync-indicator.syncing {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .tabs {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid var(--border);
        }

        .tab-button {
            padding: 12px 16px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab-button:hover {
            color: var(--text-primary);
        }

        .tab-button.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* Contenido Principal */
        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: var(--spacing);
        }

        /* Formulario de Entrada */
        .input-group {
            margin-bottom: 16px;
        }

        .input-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        textarea,
        select {
            width: 100%;
            padding: 10px 12px;
            background: var(--primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        button {
            padding: 10px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: #0052a3;
        }

        .btn-secondary {
            background: var(--primary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }

        /* Drag & Drop */
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--primary);
        }

        .drop-zone:hover,
        .drop-zone.drag-over {
            border-color: var(--accent);
            background: #1a2332;
        }

        .drop-zone-text {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Documentos */
        .documents-list {
            display: grid;
            gap: 12px;
        }

        .document-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--primary);
            border: 1px solid var(--border);
            border-radius: 6px;
        }

        .document-info {
            flex: 1;
        }

        .document-name {
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .document-meta {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .document-actions {
            display: flex;
            gap: 8px;
        }

        /* Planos */
        .planos-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        .planos-table th,
        .planos-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .planos-table th {
            background: var(--primary);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .planos-table tr:hover {
            background: #252525;
        }

        .checkbox-cell {
            text-align: center;
        }

        .checkbox-cell input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        /* Chat */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 12px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px;
            border-radius: 8px;
        }

        .message.assistant .message-content {
            background: var(--primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .message.user .message-content {
            background: var(--accent);
            color: white;
        }

        .chat-input-area {
            display: flex;
            gap: 8px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .chat-input {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-input-field {
            display: flex;
            gap: 8px;
        }

        .chat-input-field input {
            flex: 1;
        }

        .chat-filters {
            display: flex;
            gap: 8px;
            font-size: 12px;
        }

        .filter-badge {
            padding: 4px 8px;
            background: var(--accent-light);
            color: var(--accent);
            border-radius: 4px;
        }

        /* Calendario */
        .calendar-view {
            background: var(--primary);
            border-radius: 8px;
            padding: 16px;
            border: 1px solid var(--border);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-top: 16px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            position: relative;
        }

        .calendar-day:hover {
            border-color: var(--accent);
        }

        .calendar-day.mine {
            border-left: 3px solid var(--accent);
        }

        .calendar-day.theirs {
            border-left: 3px solid var(--warning);
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-header {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 24px;
            padding: 0;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        /* Welcome */
        .welcome-section {
            text-align: center;
            padding: 40px 20px;
        }

        .welcome-title {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .welcome-date {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .welcome-quote {
            font-size: 18px;
            font-style: italic;
            color: var(--text-secondary);
            margin-bottom: 8px;
            line-height: 1.6;
        }

        .welcome-author {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Scroll Bar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { Plus, Trash2, Download, Upload, Send, Calendar, FileText, Info, Settings, Check, AlertCircle } = lucide;

        // QUOTES DE INSPIRACIÓN
        const QUOTES = [
            { text: "La única fuente de conocimiento es la experiencia.", author: "Albert Einstein" },
            { text: "El éxito no es definitivo, el fracaso no es fatal.", author: "Winston Churchill" },
            { text: "La creatividad es la inteligencia divirtiéndose.", author: "Albert Einstein" },
            { text: "No podemos cambiar lo que no sabemos. El conocimiento es poder.", author: "R. F. Smith" },
            { text: "El futuro pertenece a quienes creen en la belleza de sus sueños.", author: "Eleanor Roosevelt" },
            { text: "La persistencia es el camino del éxito.", author: "Charlie Chaplin" },
        ];

        // SISTEMA DE ALMACENAMIENTO
        class StorageManager {
            async init() {
                return new Promise((resolve) => {
                    const request = indexedDB.open('MaravellaOS', 1);
                    request.onerror = () => resolve(false);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('consultants')) {
                            db.createObjectStore('consultants', { keyPath: 'id' });
                        }
                        if (!db.objectStoreNames.contains('documents')) {
                            db.createObjectStore('documents', { keyPath: 'id' });
                        }
                        if (!db.objectStoreNames.contains('messages')) {
                            db.createObjectStore('messages', { keyPath: 'id' });
                        }
                    };
                    request.onsuccess = () => resolve(true);
                });
            }

            async saveConsultant(consultant) {
                return new Promise((resolve) => {
                    const request = indexedDB.open('MaravellaOS');
                    request.onsuccess = () => {
                        const db = request.result;
                        const tx = db.transaction('consultants', 'readwrite');
                        tx.objectStore('consultants').put({...consultant, synced: false});
                        tx.oncomplete = () => resolve(true);
                    };
                });
            }

            async getConsultants() {
                return new Promise((resolve) => {
                    const request = indexedDB.open('MaravellaOS');
                    request.onsuccess = () => {
                        const db = request.result;
                        const tx = db.transaction('consultants', 'readonly');
                        const req = tx.objectStore('consultants').getAll();
                        req.onsuccess = () => resolve(req.result || []);
                    };
                });
            }

            async deleteConsultant(id) {
                return new Promise((resolve) => {
                    const request = indexedDB.open('MaravellaOS');
                    request.onsuccess = () => {
                        const db = request.result;
                        const tx = db.transaction('consultants', 'readwrite');
                        tx.objectStore('consultants').delete(id);
                        tx.oncomplete = () => resolve(true);
                    };
                });
            }
        }

        const storage = new StorageManager();

        // COMPONENTE PRINCIPAL
        function MaravellaOS() {
            const [consultants, setConsultants] = useState([]);
            const [activeConsultant, setActiveConsultant] = useState(null);
            const [activeTab, setActiveTab] = useState('welcome');
            const [showAddModal, setShowAddModal] = useState(false);
            const [syncStatus, setSyncStatus] = useState('synced');
            const [messages, setMessages] = useState([]);
            const [messageInput, setMessageInput] = useState('');
            const [selectedConsultantFilter, setSelectedConsultantFilter] = useState('all');

            // Cargar consultantes
            useEffect(() => {
                storage.init().then(() => {
                    storage.getConsultants().then(data => {
                        setConsultants(data);
                        if (data.length > 0) setActiveConsultant(data[0].id);
                    });
                });
            }, []);

            const handleAddConsultant = (name, company) => {
                const newConsultant = {
                    id: Date.now(),
                    name,
                    company,
                    phone: '',
                    email: '',
                    schedule: '',
                    notes: '',
                    documents: [],
                    planes: [],
                    events: [],
                    created: new Date().toISOString()
                };
                storage.saveConsultant(newConsultant);
                setConsultants([...consultants, newConsultant]);
                setActiveConsultant(newConsultant.id);
                setShowAddModal(false);
            };

            const handleDeleteConsultant = (id) => {
                if (window.confirm('¿Eliminar este consultor? Esta acción no se puede deshacer.')) {
                    storage.deleteConsultant(id);
                    setConsultants(consultants.filter(c => c.id !== id));
                    if (activeConsultant === id) {
                        setActiveConsultant(consultants.length > 1 ? consultants[0].id : null);
                    }
                }
            };

            const activeConsultantData = consultants.find(c => c.id === activeConsultant);

            return (
                <div className="container">
                    {/* PANEL IZQUIERDO */}
                    <div className="sidebar">
                        <div className="sidebar-header">
                            <div className="sidebar-title">
                                <Settings size={18} />
                                Consultores
                            </div>
                            <button className="add-consultant-btn" onClick={() => setShowAddModal(true)}>
                                <Plus size={16} style={{display: 'inline', marginRight: '4px'}} /> Agregar
                            </button>
                        </div>
                        <div className="consultants-list">
                            {consultants.map((consultant, index) => (
                                <div
                                    key={consultant.id}
                                    className={`consultant-item ${activeConsultant === consultant.id ? 'active' : ''}`}
                                    onClick={() => setActiveConsultant(consultant.id)}
                                >
                                    <div className="consultant-item-name">{consultant.name}</div>
                                    <div className="consultant-item-company">{consultant.company}</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* PANEL PRINCIPAL */}
                    <div className="main-content">
                        {activeConsultantData ? (
                            <>
                                {/* HEADER */}
                                <div className="content-header">
                                    <div className="header-top">
                                        <div className="header-title">{activeConsultantData.company}</div>
                                        <div className="sync-status">
                                            <div className={`sync-indicator ${syncStatus === 'syncing' ? 'syncing' : ''}`}></div>
                                            {syncStatus === 'synced' ? 'Sincronizado' : 'Sincronizando...'}
                                        </div>
                                    </div>
                                    <div className="tabs">
                                        <button className={`tab-button ${activeTab === 'welcome' ? 'active' : ''}`} onClick={() => setActiveTab('welcome')}>
                                            Welcome
                                        </button>
                                        <button className={`tab-button ${activeTab === 'info' ? 'active' : ''}`} onClick={() => setActiveTab('info')}>
                                            <Info size={14} style={{display: 'inline', marginRight: '4px'}} /> Info
                                        </button>
                                        <button className={`tab-button ${activeTab === 'notes' ? 'active' : ''}`} onClick={() => setActiveTab('notes')}>
                                            Notas
                                        </button>
                                        <button className={`tab-button ${activeTab === 'documents' ? 'active' : ''}`} onClick={() => setActiveTab('documents')}>
                                            <FileText size={14} style={{display: 'inline', marginRight: '4px'}} /> Documentos
                                        </button>
                                        <button className={`tab-button ${activeTab === 'planes' ? 'active' : ''}`} onClick={() => setActiveTab('planes')}>
                                            Planos
                                        </button>
                                        <button className={`tab-button ${activeTab === 'calendar' ? 'active' : ''}`} onClick={() => setActiveTab('calendar')}>
                                            <Calendar size={14} style={{display: 'inline', marginRight: '4px'}} /> Calendario
                                        </button>
                                        <button className={`tab-button ${activeTab === 'chat' ? 'active' : ''}`} onClick={() => setActiveTab('chat')}>
                                            Chat
                                        </button>
                                    </div>
                                </div>

                                {/* CONTENIDO */}
                                <div className="tab-content">
                                    {activeTab === 'welcome' && <WelcomeTab />}
                                    {activeTab === 'info' && <InfoTab consultant={activeConsultantData} onDelete={() => handleDeleteConsultant(activeConsultant)} />}
                                    {activeTab === 'notes' && <NotesTab consultant={activeConsultantData} />}
                                    {activeTab === 'documents' && <DocumentsTab consultant={activeConsultantData} />}
                                    {activeTab === 'planes' && <PlanosTab consultant={activeConsultantData} />}
                                    {activeTab === 'calendar' && <CalendarTab consultant={activeConsultantData} />}
                                    {activeTab === 'chat' && <ChatTab consultant={activeConsultantData} consultants={consultants} />}
                                </div>
                            </>
                        ) : (
                            <div className="tab-content">
                                <div className="empty-state">
                                    <div className="empty-state-icon">📋</div>
                                    <p>Agrega un consultor para comenzar</p>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* MODAL AGREGAR CONSULTOR */}
                    {showAddModal && (
                        <AddConsultantModal
                            onAdd={handleAddConsultant}
                            onClose={() => setShowAddModal(false)}
                        />
                    )}
                </div>
            );
        }

        function WelcomeTab() {
            const today = new Date();
            const quote = QUOTES[Math.floor(Math.random() * QUOTES.length)];
            const dateStr = today.toLocaleDateString('es-MX', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

            return (
                <div className="welcome-section">
                    <div className="welcome-title">Bienvenido a Maravella OS</div>
                    <div className="welcome-date">{dateStr}</div>
                    <div className="welcome-quote">"{quote.text}"</div>
                    <div className="welcome-author">— {quote.author}</div>
                </div>
            );
        }

        function InfoTab({ consultant, onDelete }) {
            const [info, setInfo] = useState(consultant);

            return (
                <div style={{maxWidth: '600px'}}>
                    <div className="input-group">
                        <label className="input-label">Nombre del Contacto</label>
                        <input type="text" value={info.name} onChange={(e) => setInfo({...info, name: e.target.value})} />
                    </div>
                    <div className="input-group">
                        <label className="input-label">Empresa</label>
                        <input type="text" value={info.company} onChange={(e) => setInfo({...info, company: e.target.value})} />
                    </div>
                    <div className="input-group">
                        <label className="input-label">Teléfono</label>
                        <input type="tel" value={info.phone} onChange={(e) => setInfo({...info, phone: e.target.value})} />
                    </div>
                    <div className="input-group">
                        <label className="input-label">Email</label>
                        <input type="email" value={info.email} onChange={(e) => setInfo({...info, email: e.target.value})} />
                    </div>
                    <div className="input-group">
                        <label className="input-label">Horarios / Schedule</label>
                        <textarea value={info.schedule} onChange={(e) => setInfo({...info, schedule: e.target.value})} placeholder="Ej: Lunes a Jueves, 9:00 AM - 5:00 PM" />
                    </div>
                    <div className="button-group">
                        <button className="btn-primary">Guardar Cambios</button>
                        <button className="btn-danger" onClick={onDelete}>
                            <Trash2 size={14} style={{display: 'inline', marginRight: '4px'}} /> Eliminar Consultor
                        </button>
                    </div>
                </div>
            );
        }

        function NotesTab({ consultant }) {
            const [notes, setNotes] = useState(consultant.notes);

            return (
                <div style={{maxWidth: '800px'}}>
                    <div className="input-group">
                        <label className="input-label">Notas Personales</label>
                        <textarea
                            value={notes}
                            onChange={(e) => setNotes(e.target.value)}
                            placeholder="Agrega notas, correos, o información de juntas aquí..."
                            style={{minHeight: '400px'}}
                        />
                    </div>
                    <button className="btn-primary">Guardar Notas</button>
                </div>
            );
        }

        function DocumentsTab({ consultant }) {
            const [dragOver, setDragOver] = useState(false);

            const handleDrop = (e) => {
                e.preventDefault();
                setDragOver(false);
                const files = e.dataTransfer.files;
                console.log('Archivos cargados:', files);
                // Aquí iría la lógica de procesamiento
            };

            return (
                <div style={{maxWidth: '800px'}}>
                    <div
                        className={`drop-zone ${dragOver ? 'drag-over' : ''}`}
                        onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
                        onDragLeave={() => setDragOver(false)}
                        onDrop={handleDrop}
                    >
                        <Upload size={32} style={{margin: '0 auto 12px', opacity: 0.5}} />
                        <div className="drop-zone-text">
                            <p>Arrastra PDFs o Excel aquí para subir</p>
                            <p style={{fontSize: '12px', marginTop: '8px'}}>o haz clic para seleccionar</p>
                        </div>
                    </div>

                    {consultant.documents.length > 0 && (
                        <div style={{marginTop: '24px'}}>
                            <h3 style={{marginBottom: '12px', fontSize: '14px', fontWeight: '600'}}>Documentos</h3>
                            <div className="documents-list">
                                {consultant.documents.map((doc, idx) => (
                                    <div key={idx} className="document-item">
                                        <div className="document-info">
                                            <div className="document-name">{doc.name}</div>
                                            <div className="document-meta">Subido: {new Date(doc.uploadDate).toLocaleDateString('es-MX')}</div>
                                        </div>
                                        <div className="document-actions">
                                            <button className="btn-secondary btn-small">Descargar</button>
                                            <button className="btn-danger btn-small">Eliminar</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function PlanosTab({ consultant }) {
            const [planes, setPlanes] = useState(consultant.planes || []);

            const addPlano = () => {
                setPlanes([...planes, {id: Date.now(), clave: '', nombre: '', fechaEntrega: '', revision: '', delivered: false}]);
            };

            return (
                <div style={{maxWidth: '1000px'}}>
                    <button className="btn-primary" onClick={addPlano} style={{marginBottom: '16px'}}>
                        <Plus size={14} style={{display: 'inline', marginRight: '4px'}} /> Agregar Plano
                    </button>

                    {planes.length > 0 ? (
                        <table className="planos-table">
                            <thead>
                                <tr>
                                    <th>Clave</th>
                                    <th>Nombre del Plano</th>
                                    <th>Fecha Entrega</th>
                                    <th>Revisión</th>
                                    <th style={{textAlign: 'center'}}>Entregado</th>
                                </tr>
                            </thead>
                            <tbody>
                                {planes.map((plano) => (
                                    <tr key={plano.id}>
                                        <td><input type="text" value={plano.clave} placeholder="Ej: P001" style={{width: '100%'}} /></td>
                                        <td><input type="text" value={plano.nombre} placeholder="Nombre" style={{width: '100%'}} /></td>
                                        <td><input type="date" value={plano.fechaEntrega} style={{width: '100%'}} /></td>
                                        <td><input type="text" value={plano.revision} placeholder="v1.0" style={{width: '80px'}} /></td>
                                        <td className="checkbox-cell">
                                            <input type="checkbox" checked={plano.delivered} />
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    ) : (
                        <p style={{color: 'var(--text-secondary)', textAlign: 'center', padding: '40px'}}>No hay planos registrados</p>
                    )}
                </div>
            );
        }

        function CalendarTab({ consultant }) {
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const days = [];
            const firstDay = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), 1);
            const lastDay = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 0);

            for (let i = 0; i < firstDay.getDay(); i++) {
                days.push(null);
            }

            for (let i = 1; i <= lastDay.getDate(); i++) {
                days.push(new Date(currentMonth.getFullYear(), currentMonth.getMonth(), i));
            }

            return (
                <div style={{maxWidth: '600px'}}>
                    <div className="calendar-view">
                        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px'}}>
                            <button className="btn-secondary btn-small" onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1))}>←</button>
                            <h3>{currentMonth.toLocaleDateString('es-MX', {month: 'long', year: 'numeric'})}</h3>
                            <button className="btn-secondary btn-small" onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1))}>→</button>
                        </div>

                        <div style={{display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '4px', fontSize: '12px', marginBottom: '16px'}}>
                            {['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sab'].map(d => (
                                <div key={d} style={{textAlign: 'center', fontWeight: 'bold', color: 'var(--text-secondary)', padding: '8px'}}>
                                    {d}
                                </div>
                            ))}
                        </div>

                        <div className="calendar-grid">
                            {days.map((day, idx) => (
                                <div key={idx} className="calendar-day">
                                    {day && day.getDate()}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function ChatTab({ consultant, consultants }) {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [filter, setFilter] = useState('all');
            const messagesEnd = useRef(null);

            useEffect(() => {
                messagesEnd.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            const handleSendMessage = () => {
                if (input.trim()) {
                    setMessages([...messages, {
                        id: Date.now(),
                        type: 'user',
                        content: input,
                        timestamp: new Date()
                    }]);

                    // Simulación de respuesta IA
                    setTimeout(() => {
                        setMessages(prev => [...prev, {
                            id: Date.now(),
                            type: 'assistant',
                            content: 'He procesado tu pregunta basándome en los documentos de ' + consultant.company + '.',
                            timestamp: new Date()
                        }]);
                    }, 500);

                    setInput('');
                }
            };

            return (
                <div className="chat-container">
                    <div className="chat-messages">
                        {messages.length === 0 ? (
                            <div className="empty-state">
                                <div className="empty-state-icon">💬</div>
                                <p>Inicia una conversación</p>
                            </div>
                        ) : (
                            messages.map(msg => (
                                <div key={msg.id} className={`message ${msg.type}`}>
                                    <div className="message-content">
                                        {msg.content}
                                    </div>
                                </div>
                            ))
                        )}
                        <div ref={messagesEnd} />
                    </div>

                    <div className="chat-input-area">
                        <div className="chat-input">
                            <div className="chat-filters">
                                <select value={filter} onChange={(e) => setFilter(e.target.value)} style={{padding: '4px 8px', fontSize: '12px', background: 'var(--primary)', border: '1px solid var(--border)', borderRadius: '4px', color: 'var(--text-primary)', cursor: 'pointer'}}>
                                    <option value="all">Todos los consultores</option>
                                    {consultants.map(c => (
                                        <option key={c.id} value={c.id}>{c.company}</option>
                                    ))}
                                </select>
                            </div>
                            <div className="chat-input-field">
                                <input
                                    type="text"
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && handleSendMessage()}
                                    placeholder="Haz una pregunta..."
                                />
                                <button className="btn-primary" onClick={handleSendMessage} style={{padding: '10px 16px'}}>
                                    <Send size={16} />
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function AddConsultantModal({ onAdd, onClose }) {
            const [name, setName] = useState('');
            const [company, setCompany] = useState('');

            const handleSubmit = () => {
                if (name.trim() && company.trim()) {
                    onAdd(name, company);
                }
            };

            return (
                <div className="modal">
                    <div className="modal-content">
                        <div className="modal-header">
                            <span>Agregar Consultor</span>
                            <button className="modal-close" onClick={onClose}>×</button>
                        </div>

                        <div className="input-group">
                            <label className="input-label">Nombre del Contacto</label>
                            <input
                                type="text"
                                value={name}
                                onChange={(e) => setName(e.target.value)}
                                placeholder="Juan Pérez"
                            />
                        </div>

                        <div className="input-group">
                            <label className="input-label">Nombre de la Empresa</label>
                            <input
                                type="text"
                                value={company}
                                onChange={(e) => setCompany(e.target.value)}
                                placeholder="Estructuras XYZ"
                            />
                        </div>

                        <div className="button-group">
                            <button className="btn-primary" onClick={handleSubmit}>Crear Consultor</button>
                            <button className="btn-secondary" onClick={onClose}>Cancelar</button>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<MaravellaOS />, document.getElementById('root'));
    </script>
</body>
</html>
