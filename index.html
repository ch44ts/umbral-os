<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umbral OS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0f0f0f;
            --secondary: #1a1a1a;
            --accent: #0066cc;
            --accent-light: #e6f2ff;
            --text-primary: #f5f5f5;
            --text-secondary: #a0a0a0;
            --border: #333;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--primary);
            color: var(--text-primary);
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background: var(--secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .add-btn {
            width: 100%;
            padding: 10px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .add-btn:hover {
            background: #0052a3;
        }

        .consultants-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .consultant-item {
            padding: 12px;
            margin-bottom: 8px;
            background: var(--primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .consultant-item:hover {
            border-color: var(--accent);
            background: #252525;
        }

        .consultant-item.active {
            border-left-color: var(--accent);
            background: #1f2937;
        }

        .consultant-name {
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .consultant-company {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .content-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            background: var(--secondary);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .header-title {
            font-size: 24px;
            font-weight: 600;
        }

        .sync-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
            padding: 6px 12px;
            background: var(--primary);
            border-radius: 4px;
        }

        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .tabs {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid var(--border);
        }

        .tab-btn {
            padding: 12px 16px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            color: var(--text-primary);
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        /* INPUTS */
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        textarea,
        select {
            width: 100%;
            padding: 10px 12px;
            background: var(--primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }

        .btn {
            padding: 10px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            margin-right: 8px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: #0052a3;
        }

        .btn-secondary {
            background: var(--primary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            margin-right: 4px;
        }

        /* WELCOME */
        .welcome {
            text-align: center;
            padding: 60px 20px;
        }

        .welcome-title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .welcome-date {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        .welcome-quote {
            font-size: 18px;
            font-style: italic;
            color: var(--text-secondary);
            margin-bottom: 8px;
            line-height: 1.6;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .welcome-author {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* DOCUMENTS */
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--primary);
            margin-bottom: 20px;
        }

        .drop-zone:hover,
        .drop-zone.drag-over {
            border-color: var(--accent);
            background: #1a2332;
        }

        .drop-zone-text {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .documents-list {
            display: grid;
            gap: 12px;
        }

        .document-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--primary);
            border: 1px solid var(--border);
            border-radius: 6px;
        }

        .document-info {
            flex: 1;
        }

        .document-name {
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .document-meta {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* TABLA */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: var(--primary);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        tr:hover {
            background: #252525;
        }

        /* CHAT */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px;
            border-radius: 8px;
        }

        .message.assistant .message-content {
            background: var(--primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .message.user .message-content {
            background: var(--accent);
            color: white;
        }

        .chat-input-area {
            display: flex;
            gap: 8px;
        }

        .chat-input-area input {
            flex: 1;
            margin-bottom: 0;
        }

        /* MODAL */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.hidden {
            display: none;
        }

        .modal-content {
            background: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-header {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .hidden {
            display: none !important;
        }

        .max-width {
            max-width: 800px;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">📋 Consultores</div>
                <button class="add-btn" onclick="openAddModal()">+ Agregar</button>
            </div>
            <div class="consultants-list" id="consultantsList"></div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <div class="content-header">
                <div class="header-top">
                    <div class="header-title" id="headerTitle">Bienvenido</div>
                    <div class="sync-status">
                        <div class="sync-dot"></div>
                        <span>Sincronizado</span>
                    </div>
                </div>
                <div class="tabs" id="tabs"></div>
            </div>

            <div class="tab-content" id="content"></div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal hidden" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span>Agregar Consultor</span>
                <button style="background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 24px;" onclick="closeAddModal()">×</button>
            </div>
            <div class="form-group">
                <label class="label">Nombre del Contacto</label>
                <input type="text" id="inputName" placeholder="Juan Pérez">
            </div>
            <div class="form-group">
                <label class="label">Nombre de la Empresa</label>
                <input type="text" id="inputCompany" placeholder="Estructuras XYZ">
            </div>
            <div style="display: flex; gap: 8px;">
                <button class="btn btn-primary" onclick="addConsultant()">Crear Consultor</button>
                <button class="btn btn-secondary" onclick="closeAddModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        // QUOTES
        const QUOTES = [
            { text: "La única fuente de conocimiento es la experiencia.", author: "Albert Einstein" },
            { text: "El éxito no es definitivo, el fracaso no es fatal.", author: "Winston Churchill" },
            { text: "La creatividad es la inteligencia divirtiéndose.", author: "Albert Einstein" },
            { text: "No podemos cambiar lo que no sabemos. El conocimiento es poder.", author: "R. F. Smith" },
            { text: "El futuro pertenece a quienes creen en la belleza de sus sueños.", author: "Eleanor Roosevelt" },
            { text: "La persistencia es el camino del éxito.", author: "Charlie Chaplin" },
        ];

        // STATE
        let consultants = [];
        let activeConsultant = null;
        let activeTab = 'welcome';

        // INIT
        function init() {
            loadConsultants();
            renderConsultants();
            if (consultants.length > 0) {
                setActiveConsultant(consultants[0].id);
            }
        }

        // LOAD/SAVE
        function loadConsultants() {
            const stored = localStorage.getItem('umbralOS_consultants');
            consultants = stored ? JSON.parse(stored) : [];
        }

        function saveConsultants() {
            localStorage.setItem('umbralOS_consultants', JSON.stringify(consultants));
        }

        // CONSULTANTS
        function renderConsultants() {
            const list = document.getElementById('consultantsList');
            list.innerHTML = consultants.map(c => `
                <div class="consultant-item ${activeConsultant === c.id ? 'active' : ''}" onclick="setActiveConsultant('${c.id}')">
                    <div class="consultant-name">${c.name}</div>
                    <div class="consultant-company">${c.company}</div>
                </div>
            `).join('');
        }

        function setActiveConsultant(id) {
            activeConsultant = id;
            activeTab = 'welcome';
            renderConsultants();
            renderContent();
        }

        function addConsultant() {
            const name = document.getElementById('inputName').value.trim();
            const company = document.getElementById('inputCompany').value.trim();
            
            if (!name || !company) {
                alert('Completa todos los campos');
                return;
            }

            consultants.push({
                id: Date.now(),
                name,
                company,
                phone: '',
                email: '',
                schedule: '',
                notes: '',
                documents: [],
                planes: [],
                created: new Date().toISOString()
            });

            saveConsultants();
            renderConsultants();
            setActiveConsultant(consultants[consultants.length - 1].id);
            closeAddModal();
        }

        // MODAL
        function openAddModal() {
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('inputName').focus();
        }

        function closeAddModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('inputName').value = '';
            document.getElementById('inputCompany').value = '';
        }

        // TABS
        function renderTabs() {
            if (!activeConsultant) return;
            
            const tabs = ['welcome', 'info', 'notes', 'documents', 'planes', 'calendar', 'chat'];
            const tabsDiv = document.getElementById('tabs');
            
            tabsDiv.innerHTML = tabs.map(tab => `
                <button class="tab-btn ${activeTab === tab ? 'active' : ''}" onclick="setTab('${tab}')">
                    ${tab.charAt(0).toUpperCase() + tab.slice(1)}
                </button>
            `).join('');
        }

        function setTab(tab) {
            activeTab = tab;
            renderContent();
        }

        // CONTENT
        function renderContent() {
            renderTabs();
            const content = document.getElementById('content');
            const consultant = consultants.find(c => c.id === activeConsultant);

            if (!consultant) {
                content.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📋</div><p>Agrega un consultor para comenzar</p></div>';
                document.getElementById('headerTitle').textContent = 'Bienvenido';
                return;
            }

            document.getElementById('headerTitle').textContent = consultant.company;

            if (activeTab === 'welcome') {
                const quote = QUOTES[Math.floor(Math.random() * QUOTES.length)];
                const today = new Date();
                const dateStr = today.toLocaleDateString('es-MX', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                
                content.innerHTML = `
                    <div class="welcome">
                        <div class="welcome-title">Umbral OS</div>
                        <div class="welcome-date">${dateStr}</div>
                        <div class="welcome-quote">"${quote.text}"</div>
                        <div class="welcome-author">— ${quote.author}</div>
                    </div>
                `;
            } else if (activeTab === 'info') {
                content.innerHTML = `
                    <div class="max-width">
                        <div class="form-group">
                            <label class="label">Nombre del Contacto</label>
                            <input type="text" value="${consultant.name}" onchange="updateConsultant(activeConsultant, 'name', this.value)">
                        </div>
                        <div class="form-group">
                            <label class="label">Empresa</label>
                            <input type="text" value="${consultant.company}" onchange="updateConsultant(activeConsultant, 'company', this.value)">
                        </div>
                        <div class="form-group">
                            <label class="label">Teléfono</label>
                            <input type="tel" value="${consultant.phone || ''}" onchange="updateConsultant(activeConsultant, 'phone', this.value)">
                        </div>
                        <div class="form-group">
                            <label class="label">Email</label>
                            <input type="email" value="${consultant.email || ''}" onchange="updateConsultant(activeConsultant, 'email', this.value)">
                        </div>
                        <div class="form-group">
                            <label class="label">Horarios / Schedule</label>
                            <textarea onchange="updateConsultant(activeConsultant, 'schedule', this.value)" placeholder="Ej: Lunes a Jueves, 9:00 AM - 5:00 PM">${consultant.schedule || ''}</textarea>
                        </div>
                        <button class="btn btn-primary">Guardar Cambios</button>
                        <button class="btn btn-danger" onclick="deleteConsultant(activeConsultant)">Eliminar Consultor</button>
                    </div>
                `;
            } else if (activeTab === 'notes') {
                content.innerHTML = `
                    <div class="max-width">
                        <div class="form-group">
                            <label class="label">Notas Personales</label>
                            <textarea style="min-height: 400px;" onchange="updateConsultant(activeConsultant, 'notes', this.value)" placeholder="Agrega notas, correos, o información de juntas...">${consultant.notes || ''}</textarea>
                        </div>
                        <button class="btn btn-primary">Guardar Notas</button>
                    </div>
                `;
            } else if (activeTab === 'documents') {
                content.innerHTML = `
                    <div class="max-width">
                        <div class="drop-zone" ondrop="handleDrop(event, activeConsultant)" ondragover="event.preventDefault(); this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')">
                            <div class="drop-zone-text">
                                <p>📤 Arrastra PDFs o Excel aquí</p>
                                <p style="font-size: 12px; margin-top: 8px;">o haz clic para seleccionar</p>
                            </div>
                        </div>
                        ${consultant.documents.length > 0 ? `
                            <h3 style="margin-bottom: 12px; font-size: 14px; font-weight: 600;">Documentos</h3>
                            <div class="documents-list">
                                ${consultant.documents.map((doc, idx) => `
                                    <div class="document-item">
                                        <div class="document-info">
                                            <div class="document-name">${doc.name}</div>
                                            <div class="document-meta">Subido: ${new Date(doc.uploadDate).toLocaleDateString('es-MX')}</div>
                                        </div>
                                        <button class="btn btn-danger btn-small" onclick="deleteDocument(activeConsultant, ${idx})">Eliminar</button>
                                    </div>
                                `).join('')}
                            </div>
                        ` : '<p style="color: var(--text-secondary); text-align: center; padding: 40px;">No hay documentos</p>'}
                    </div>
                `;
            } else if (activeTab === 'planes') {
                content.innerHTML = `
                    <div class="max-width">
                        <button class="btn btn-primary" onclick="addPlano(activeConsultant)">+ Agregar Plano</button>
                        <table>
                            <thead>
                                <tr>
                                    <th>Clave</th>
                                    <th>Nombre</th>
                                    <th>Fecha Entrega</th>
                                    <th>Revisión</th>
                                    <th>Entregado</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${consultant.planes && consultant.planes.length > 0 ? consultant.planes.map((p, idx) => `
                                    <tr>
                                        <td><input type="text" value="${p.clave || ''}" placeholder="P001" style="width: 100%; padding: 4px;"></td>
                                        <td><input type="text" value="${p.nombre || ''}" placeholder="Nombre" style="width: 100%; padding: 4px;"></td>
                                        <td><input type="date" value="${p.fechaEntrega || ''}" style="width: 100%; padding: 4px;"></td>
                                        <td><input type="text" value="${p.revision || ''}" placeholder="v1.0" style="width: 80px; padding: 4px;"></td>
                                        <td style="text-align: center;"><input type="checkbox" ${p.delivered ? 'checked' : ''}></td>
                                    </tr>
                                `).join('') : '<tr><td colspan="5" style="text-align: center; color: var(--text-secondary);">No hay planos registrados</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                `;
            } else if (activeTab === 'calendar') {
                const now = new Date();
                const year = now.getFullYear();
                const month = now.getMonth();
                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month + 1, 0);
                const daysInMonth = lastDay.getDate();
                const startingDayOfWeek = firstDay.getDay();
                
                let daysHTML = '';
                for (let i = 0; i < startingDayOfWeek; i++) {
                    daysHTML += '<div class="calendar-day"></div>';
                }
                for (let day = 1; day <= daysInMonth; day++) {
                    daysHTML += `<div class="calendar-day">${day}</div>`;
                }

                content.innerHTML = `
                    <div class="max-width">
                        <div style="background: var(--primary); border-radius: 8px; padding: 16px; border: 1px solid var(--border);">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                                <h3>${now.toLocaleDateString('es-MX', {month: 'long', year: 'numeric'})}</h3>
                            </div>
                            <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; font-size: 12px; margin-bottom: 12px;">
                                ${['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sab'].map(d => `<div style="text-align: center; font-weight: bold; color: var(--text-secondary); padding: 8px;">${d}</div>`).join('')}
                            </div>
                            <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;">
                                ${daysHTML}
                            </div>
                        </div>
                    </div>
                `;
            } else if (activeTab === 'chat') {
                content.innerHTML = `
                    <div class="chat-container">
                        <div class="chat-messages" id="chatMessages">
                            <div class="empty-state">
                                <div class="empty-state-icon">💬</div>
                                <p>Inicia una conversación</p>
                            </div>
                        </div>
                        <div class="chat-input-area">
                            <input type="text" placeholder="Haz una pregunta..." id="chatInput" onkeypress="if(event.key === 'Enter') sendMessage()">
                            <button class="btn btn-primary" onclick="sendMessage()">Enviar</button>
                        </div>
                    </div>
                `;
            }
        }

        function updateConsultant(id, field, value) {
            const c = consultants.find(x => x.id === id);
            if (c) {
                c[field] = value;
                saveConsultants();
            }
        }

        function deleteConsultant(id) {
            if (confirm('¿Eliminar este consultor? No se puede deshacer.')) {
                consultants = consultants.filter(c => c.id !== id);
                saveConsultants();
                activeConsultant = consultants.length > 0 ? consultants[0].id : null;
                renderConsultants();
                renderContent();
            }
        }

        function deleteDocument(id, idx) {
            const c = consultants.find(x => x.id === id);
            if (c && confirm('¿Eliminar este documento?')) {
                c.documents.splice(idx, 1);
                saveConsultants();
                renderContent();
            }
        }

        function addPlano(id) {
            const c = consultants.find(x => x.id === id);
            if (c) {
                c.planes.push({id: Date.now(), clave: '', nombre: '', fechaEntrega: '', revision: '', delivered: false});
                saveConsultants();
                renderContent();
            }
        }

        function handleDrop(e, id) {
            e.preventDefault();
            e.target.classList.remove('drag-over');
            const files = e.dataTransfer.files;
            const c = consultants.find(x => x.id === id);
            if (c) {
                Array.from(files).forEach(file => {
                    c.documents.push({
                        name: file.name,
                        size: file.size,
                        uploadDate: new Date().toISOString()
                    });
                });
                saveConsultants();
                renderContent();
            }
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;

            const messagesDiv = document.getElementById('chatMessages');
            if (messagesDiv.querySelector('.empty-state')) {
                messagesDiv.innerHTML = '';
            }

            const userMsg = document.createElement('div');
            userMsg.className = 'message user';
            userMsg.innerHTML = `<div class="message-content">${message}</div>`;
            messagesDiv.appendChild(userMsg);

            input.value = '';
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            // Simular respuesta IA
            setTimeout(() => {
                const aiMsg = document.createElement('div');
                aiMsg.className = 'message assistant';
                aiMsg.innerHTML = `<div class="message-content">He procesado tu pregunta basándome en los documentos de ${consultants.find(c => c.id === activeConsultant)?.company || 'este consultor'}.</div>`;
                messagesDiv.appendChild(aiMsg);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }, 500);
        }

        // INIT
        window.addEventListener('load', init);
    </script>
</body>
</html>
